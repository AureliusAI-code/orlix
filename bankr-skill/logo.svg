<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F07830"/>
      <stop offset="100%" style="stop-color:#E05A10"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Outer hex ring -->
  <polygon points="50,6 86,27 86,73 50,94 14,73 14,27"
    fill="none" stroke="#F07830" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Mid hex glow -->
  <polygon points="50,16 78,32 78,68 50,84 22,68 22,32"
    fill="url(#hex)" opacity="0.1"/>
  <!-- Core hex -->
  <polygon points="50,24 72,37 72,63 50,76 28,63 28,37"
    fill="url(#hex)" opacity="0.95"/>
  <!-- ORLIX wordmark -->
  <text x="50" y="54" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="11" font-weight="800" fill="#ffffff"
    text-anchor="middle" letter-spacing="0.5">ORLIX</text>
</svg>
