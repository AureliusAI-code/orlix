  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#050508;display:flex;align-items:center;justify-content:center;min-height:100vh}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes spin-rev{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.8}}
  @keyframes dash{to{stroke-dashoffset:-40}}
  .ring1{animation:spin 28s linear infinite;transform-box:fill-box;transform-origin:center}
  .ring2{animation:spin-rev 18s linear infinite;transform-box:fill-box;transform-origin:center}

  .line-flow{animation:dash 3s linear infinite}
