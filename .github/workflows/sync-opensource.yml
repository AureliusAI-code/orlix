name: Sync to Open Source

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to tylerbroqs/orlixai
        run: |
          git remote add opensource https://x-access-token:${{ secrets.TYLERBROQS_PAT }}@github.com/tylerbroqs/orlixai.git
          git push opensource main --force
