<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ORLIX AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Helvetica Neue',Arial,sans-serif}
canvas{position:fixed;inset:0;width:100%;height:100%}
#abtn{position:fixed;top:18px;right:18px;z-index:99;background:none;border:1px solid #222;
  color:#444;padding:6px 13px;font:inherit;font-size:.58rem;letter-spacing:.22em;
  text-transform:uppercase;cursor:pointer;transition:color .2s,border-color .2s}
#abtn.on{color:#aaa;border-color:#444}
#abtn:hover{color:#fff;border-color:#888}
#tap{position:fixed;inset:0;z-index:200;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
#tap img{height:clamp(48px,10vw,72px);filter:brightness(0) invert(1);margin-bottom:44px}
#tap-logo{font-size:clamp(2.5rem,8vw,5rem);font-weight:900;color:#fff;margin-bottom:44px;display:none}
#tap-hint{font-size:.62rem;letter-spacing:.6em;color:#333;text-transform:uppercase}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
#tap-hint{animation:bl 2s ease-in-out infinite}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="abtn" onclick="toggleAudio()">♪ MUTE</button>
<div id="tap" onclick="begin()">
  <img src="/orlix-logo.png" alt="ORLIX"
       onerror="this.style.display='none';document.getElementById('tap-logo').style.display='block'">
  <div id="tap-logo">ORLIX AI</div>
  <div id="tap-hint">TAP TO PLAY</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════════════════════════ */
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H;
function resize() {
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ═══════════════════════════════════════════════════════════
   DRAW PRIMITIVES
═══════════════════════════════════════════════════════════ */
function clear(col = '#000') { ctx.fillStyle = col; ctx.fillRect(0,0,W,H); }

function txt(str, x, y, size, col, weight = 900, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = col;
  ctx.font = `${weight} ${size}px "Helvetica Neue",Arial,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(str, x, y);
  ctx.restore();
}

function txtSub(str, x, y, size, col) {
  ctx.save();
  ctx.fillStyle = col;
  ctx.font = `500 ${size}px "Helvetica Neue",Arial,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = '0.4em';
  ctx.fillText(str, x, y);
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   GLITCH ENGINE
═══════════════════════════════════════════════════════════ */
function applyGlitch(intensity = 1) {
  const imgData = ctx.getImageData(0, 0, W, H);
  const d = imgData.data;
  const slices = Math.floor(8 + intensity * 14);
  for (let s = 0; s < slices; s++) {
    const y = Math.random() * H | 0;
    const h = (4 + Math.random() * 40 * intensity) | 0;
    const offset = (Math.random() * 80 - 40) * intensity | 0;
    const row = Math.min(y, H - h);
    for (let r = row; r < row + h && r < H; r++) {
      for (let x = 0; x < W; x++) {
        const srcX = ((x + offset) % W + W) % W;
        const si = (r * W + srcX) * 4;
        const di = (r * W + x) * 4;
        d[di]   = d[si];
        d[di+1] = d[si+1];
        d[di+2] = d[si+2];
      }
    }
  }
  // noise blocks
  const blocks = Math.floor(3 + intensity * 6);
  for (let b = 0; b < blocks; b++) {
    const bx = Math.random() * W | 0;
    const by = Math.random() * H | 0;
    const bw = (20 + Math.random() * 120) | 0;
    const bh = (2 + Math.random() * 12)  | 0;
    const v  = Math.random() > .5 ? 255 : 0;
    for (let r = by; r < by+bh && r < H; r++) {
      for (let x = bx; x < bx+bw && x < W; x++) {
        const i = (r * W + x) * 4;
        d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function rgbSplit(drawFn, off = 6) {
  // Draw red channel shifted left
  ctx.save(); ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = .85;
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const t = tmp.getContext('2d');
  drawFn(t);
  ctx.drawImage(tmp, -off, 0);
  ctx.restore();
  // Draw main (white)
  drawFn(ctx);
  // Draw blue channel shifted right
  ctx.save(); ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = .6;
  ctx.drawImage(tmp, off, 0);
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   SCENE RENDERERS
═══════════════════════════════════════════════════════════ */
let binaryRows = [];
function initBinary() {
  binaryRows = [];
  const cols = Math.floor(W / 14);
  for (let i = 0; i < cols; i++) {
    binaryRows.push({ x: i * 14 + 7, y: Math.random() * H, speed: 30 + Math.random() * 80 });
  }
}
function drawBinary(dt) {
  clear('#000');
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  binaryRows.forEach(r => {
    r.y = (r.y + r.speed * dt / 1000) % (H + 20);
    const chars = Math.floor(4 + Math.random() * 8);
    for (let i = 0; i < chars; i++) {
      const fy = r.y - i * 16;
      if (fy < 0 || fy > H) continue;
      const alpha = 1 - i / chars;
      ctx.fillStyle = `rgba(255,255,255,${alpha * .8})`;
      ctx.fillText(Math.random() > .5 ? '1' : '0', r.x, fy);
    }
  });
}

function drawNoise() {
  const id = ctx.createImageData(W, H);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() > .5 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
  }
  ctx.putImageData(id, 0, 0);
}

function drawScan() {
  clear('#000');
  const spacing = 4;
  for (let y = 0; y < H; y += spacing) {
    const v = Math.random() > .7 ? 255 : 0;
    ctx.fillStyle = `rgb(${v},${v},${v})`;
    ctx.fillRect(0, y, W, 1 + (Math.random() > .9 ? 2 : 0));
  }
}

/* ═══════════════════════════════════════════════════════════
   TIMELINE (all times in ms)
   type: black | white | noise | scan | binary | text | glitch | logo | fade
═══════════════════════════════════════════════════════════ */
const TL = [
  // ── Intro ──────────────────────────────────────────
  { t:   0, d:  80, type:'black' },
  { t:  80, d:  40, type:'white' },
  { t: 120, d: 480, type:'text',  text:'ORLIX',         size:.19,  sub:null,              inv:false, rgb:true  },
  { t: 600, d:  30, type:'white' },
  { t: 630, d: 220, type:'glitch',intensity:1.4 },
  { t: 850, d:  30, type:'black' },
  // ── AI ─────────────────────────────────────────────
  { t: 880, d: 380, type:'text',  text:'AI',            size:.28,  sub:null,              inv:false, rgb:true  },
  { t:1260, d: 180, type:'noise'  },
  { t:1440, d:  40, type:'white' },
  // ── Binary interlude ───────────────────────────────
  { t:1480, d: 520, type:'binary' },
  { t:2000, d:  40, type:'black' },
  { t:2040, d:  40, type:'white' },
  // ── Gate ───────────────────────────────────────────
  { t:2080, d: 520, type:'text',  text:'5,000,000',     size:.11,  sub:'$ORLIX REQUIRED', inv:false, rgb:false },
  { t:2600, d:  40, type:'black' },
  { t:2640, d: 250, type:'glitch',intensity:1.8 },
  { t:2890, d:  40, type:'white' },
  // ── Analyze ────────────────────────────────────────
  { t:2930, d: 420, type:'text',  text:'ANALYZE',       size:.16,  sub:'BASE CHAIN',      inv:true,  rgb:false },
  { t:3350, d:  40, type:'scan'   },
  { t:3390, d:  30, type:'black' },
  // ── Chat ───────────────────────────────────────────
  { t:3420, d: 380, type:'text',  text:'CHAT',          size:.22,  sub:null,              inv:false, rgb:true  },
  { t:3800, d: 200, type:'glitch',intensity:2.0 },
  { t:4000, d:  40, type:'white' },
  // ── Intelligence ───────────────────────────────────
  { t:4040, d: 460, type:'text',  text:'INTELLIGENCE',  size:.09,  sub:'POWERED BY AI',   inv:false, rgb:false },
  { t:4500, d:  30, type:'black' },
  { t:4530, d:  30, type:'white' },
  { t:4560, d:  30, type:'black' },
  { t:4590, d:  30, type:'white' },
  { t:4620, d:  30, type:'black' },
  { t:4650, d:  30, type:'white' },
  { t:4680, d:  30, type:'black' },
  // ── Rapid scan ─────────────────────────────────────
  { t:4710, d: 130, type:'scan'   },
  { t:4840, d:  40, type:'noise'  },
  { t:4880, d:  40, type:'scan'   },
  { t:4920, d:  40, type:'white' },
  // ── Logo hold ──────────────────────────────────────
  { t:4960, d:1100, type:'logo' },
  // ── URL ────────────────────────────────────────────
  { t:6060, d:1200, type:'text',  text:'ORLIXAI.XYZ',   size:.08,  sub:'HOLD 5M $ORLIX',  inv:false, rgb:false },
  // ── Outro glitch ───────────────────────────────────
  { t:7260, d: 200, type:'glitch',intensity:2.2 },
  { t:7460, d:  40, type:'white' },
  { t:7500, d: 300, type:'fade' },
];
const LOOP_DUR = 7800;

/* ═══════════════════════════════════════════════════════════
   LOGO IMAGE (preload)
═══════════════════════════════════════════════════════════ */
const logoImg = new Image();
logoImg.src = '/orlix-logo.png';

/* ═══════════════════════════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════════════════════════ */
let running = false, startT = 0, lastT = 0;

function getFrame(ms) {
  let frame = null;
  for (let i = TL.length - 1; i >= 0; i--) {
    if (ms >= TL[i].t) { frame = TL[i]; break; }
  }
  return frame;
}

function renderFrame(frame, dt) {
  if (!frame) { clear('#000'); return; }

  switch (frame.type) {
    case 'black': clear('#000'); break;
    case 'white': clear('#fff'); break;

    case 'noise': drawNoise(); break;
    case 'scan':  drawScan();  break;
    case 'binary': drawBinary(dt); break;

    case 'glitch':
      // show last frame then corrupt it
      applyGlitch(frame.intensity || 1);
      break;

    case 'text': {
      const bg  = frame.inv ? '#fff' : '#000';
      const col = frame.inv ? '#000' : '#fff';
      const sz  = Math.min(W, H) * frame.size;
      clear(bg);

      if (frame.rgb && !frame.inv) {
        // RGB split effect
        const off = sz * 0.025;
        ctx.save();
        ctx.globalAlpha = .7;
        ctx.fillStyle = '#ff0000';
        ctx.font = `900 ${sz}px "Helvetica Neue",Arial,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(frame.text, W/2 - off, H/2);
        ctx.fillStyle = '#0000ff';
        ctx.fillText(frame.text, W/2 + off, H/2);
        ctx.restore();
        ctx.globalAlpha = 1;
      }

      txt(frame.text, W/2, frame.sub ? H/2 - sz*.1 : H/2, sz, col);

      if (frame.sub) {
        const subSz = Math.min(W, H) * .018;
        ctx.save();
        ctx.fillStyle = frame.inv ? '#444' : '#555';
        ctx.font = `500 ${subSz}px "Helvetica Neue",Arial,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(frame.sub, W/2, H/2 + sz * .42);
        ctx.restore();
      }

      // occasional random glitch on text frames
      if (Math.random() < .08) applyGlitch(.4);
      break;
    }

    case 'logo': {
      clear('#000');
      if (logoImg.complete && logoImg.naturalWidth) {
        const lh = Math.min(W * .18, H * .22);
        const lw = lh * (logoImg.naturalWidth / logoImg.naturalHeight);
        ctx.save();
        ctx.filter = 'brightness(0) invert(1)';
        ctx.drawImage(logoImg, W/2 - lw/2, H/2 - lh/2, lw, lh);
        ctx.restore();
      } else {
        txt('ORLIX AI', W/2, H/2, Math.min(W,H)*.14, '#fff');
      }
      const sub = Math.min(W,H) * .016;
      ctx.fillStyle = '#333';
      ctx.font = `400 ${sub}px "Helvetica Neue",Arial,sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('INTELLIGENCE FOR THE ONCHAIN ERA', W/2, H/2 + Math.min(W,H)*.16);
      if (Math.random() < .06) applyGlitch(.5);
      break;
    }

    case 'fade': {
      const prog = Math.min((performance.now() - startT - frame.t) / frame.d, 1);
      clear('#000');
      ctx.fillStyle = `rgba(0,0,0,${prog})`;
      ctx.fillRect(0, 0, W, H);
      break;
    }
  }
}

function loop(now) {
  if (!running) return;
  const dt  = now - lastT; lastT = now;
  const ms  = (now - startT) % LOOP_DUR;
  const frame = getFrame(ms);
  renderFrame(frame, dt);
  requestAnimationFrame(loop);
}

/* ═══════════════════════════════════════════════════════════
   AUDIO — industrial 140BPM
═══════════════════════════════════════════════════════════ */
let AC = null, master = null, muted = false;

function distCurve(amt) {
  const n = 512, c = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = i * 2/n - 1;
    c[i] = (Math.PI + amt) * x / (Math.PI + amt * Math.abs(x));
  }
  return c;
}

function buildAudio() {
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain();
  master.gain.setValueAtTime(0, AC.currentTime);
  master.gain.linearRampToValueAtTime(.85, AC.currentTime + .8);
  master.connect(AC.destination);

  // Compressor to glue
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -18; comp.knee.value = 6;
  comp.ratio.value = 4; comp.attack.value = .002; comp.release.value = .1;
  comp.connect(master);

  // Distorted sub bass
  const bassOsc = AC.createOscillator(), bassG = AC.createGain();
  const dist = AC.createWaveShaper();
  dist.curve = distCurve(200);
  bassOsc.type = 'sawtooth';
  bassOsc.frequency.value = 55;
  bassG.gain.value = .18;
  bassOsc.connect(dist); dist.connect(bassG); bassG.connect(comp);
  bassOsc.start();

  // Pure sub
  const sub = AC.createOscillator(), subG = AC.createGain();
  sub.type = 'sine'; sub.frequency.value = 27.5;
  subG.gain.value = .3;
  sub.connect(subG); subG.connect(comp); sub.start();

  // Metal pad (ring-mod style)
  const padA = AC.createOscillator(), padB = AC.createOscillator();
  const ringNode = AC.createGain(), padG = AC.createGain();
  padA.type = 'sine'; padA.frequency.value = 220;
  padB.type = 'sine'; padB.frequency.value = 220 * 1.414; // tritone
  padG.gain.value = .04;
  padA.connect(ringNode.gain);
  padB.connect(ringNode);
  ringNode.connect(padG); padG.connect(comp);
  padA.start(); padB.start();

  // Beat
  schedBeat();
}

function schedKick(t) {
  const o = AC.createOscillator(), g = AC.createGain();
  const dist = AC.createWaveShaper(); dist.curve = distCurve(300);
  o.frequency.setValueAtTime(160, t);
  o.frequency.exponentialRampToValueAtTime(40, t + .12);
  g.gain.setValueAtTime(.9, t);
  g.gain.exponentialRampToValueAtTime(.001, t + .18);
  o.connect(dist); dist.connect(g); g.connect(master);
  o.start(t); o.stop(t + .22);
}

function schedSnare(t) {
  const len = AC.sampleRate * .15;
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(len*.25));
  const src = AC.createBufferSource(), g = AC.createGain();
  const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 600; f.Q.value = .8;
  g.gain.value = .55;
  src.buffer = buf;
  src.connect(f); f.connect(g); g.connect(master);
  src.start(t);
}

function schedHat(t, vol = .15) {
  const len = AC.sampleRate * .04;
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(len*.3));
  const src = AC.createBufferSource(), g = AC.createGain();
  const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7000;
  g.gain.value = vol;
  src.buffer = buf;
  src.connect(f); f.connect(g); g.connect(master);
  src.start(t);
}

function schedStab(t) {
  const o = AC.createOscillator(), g = AC.createGain();
  const d = AC.createWaveShaper(); d.curve = distCurve(500);
  o.type = 'square'; o.frequency.value = 110;
  g.gain.setValueAtTime(.35, t);
  g.gain.exponentialRampToValueAtTime(.001, t + .08);
  o.connect(d); d.connect(g); g.connect(master);
  o.start(t); o.stop(t + .1);
}

function schedBeat() {
  if (!AC) return;
  const bpm = 140, beat = 60/bpm, now = AC.currentTime;
  const bars = 2;
  for (let b = 0; b < bars * 4; b++) {
    const t = now + b * beat;
    schedHat(t, .12);
    schedHat(t + beat*.5, .08);
    if (b % 4 === 0) schedKick(t);
    if (b % 4 === 2) { schedKick(t); schedSnare(t); }
    if (b % 4 === 3 && Math.random() > .5) schedKick(t + beat*.75);
    if (b % 8 === 7) schedStab(t + beat*.5);
  }
  setTimeout(schedBeat, (bars * 4 * beat - .05) * 1000);
}

function toggleAudio() {
  const btn = document.getElementById('abtn');
  if (!AC) return;
  muted = !muted;
  master.gain.linearRampToValueAtTime(muted ? 0 : .85, AC.currentTime + .25);
  btn.textContent = muted ? '♪ UNMUTE' : '♪ MUTE';
  btn.classList.toggle('on', !muted);
}

/* ═══════════════════════════════════════════════════════════
   START
═══════════════════════════════════════════════════════════ */
function begin() {
  const tap = document.getElementById('tap');
  tap.style.transition = 'opacity .5s';
  tap.style.opacity = '0';
  setTimeout(() => tap.remove(), 550);

  initBinary();
  buildAudio();
  document.getElementById('abtn').classList.add('on');

  running = true;
  startT = lastT = performance.now();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
