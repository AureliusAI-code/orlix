<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orlix AI — Sign In</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--line:rgba(255,255,255,.09);--line-bright:rgba(255,255,255,.16);
  --text:#c0b8b0;--bright:#f0ebe3;--dim:#665e58;
  --amber:#ff9a52;--amber-soft:rgba(255,154,82,.1);
  --violet:#b9a4ff;--red:#e03030;--green:#7ee0a8;
  --mono:'JetBrains Mono',monospace;--display:'Space Grotesk',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);height:100%}
body{font-family:var(--mono);font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(255,154,82,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,154,82,.03) 1px,transparent 1px);background-size:36px 36px;animation:gridScroll 28s linear infinite}
@keyframes gridScroll{to{background-position:36px 36px}}
body::after{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(185,164,255,.07) 0%,transparent 70%)}

.card{width:100%;max-width:380px;margin:20px;background:rgba(17,17,17,.94);border:1px solid var(--line-bright);border-radius:14px;padding:40px 36px 36px;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04) inset}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-weight:700;font-size:.85rem;letter-spacing:.16em;color:var(--bright);text-transform:uppercase;margin-bottom:28px}
.brand-dot{color:var(--red);font-size:.5rem}
.login-title{font-family:var(--display);font-size:1.4rem;font-weight:700;color:var(--bright);margin-bottom:6px}
.login-sub{color:var(--dim);font-size:.78rem;margin-bottom:32px;line-height:1.5}

.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 18px;border-radius:8px;font-size:.82rem;font-family:var(--mono);font-weight:600;cursor:pointer;transition:.15s;border:1px solid;letter-spacing:.02em;background:none}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-x{background:rgba(255,154,82,.12);border-color:rgba(255,154,82,.35);color:var(--amber);margin-bottom:12px}
.btn-x:hover:not(:disabled){background:rgba(255,154,82,.2);border-color:rgba(255,154,82,.6);box-shadow:0 0 20px rgba(255,154,82,.15)}
.btn-w{background:rgba(185,164,255,.1);border-color:rgba(185,164,255,.3);color:var(--violet)}
.btn-w:hover:not(:disabled){background:rgba(185,164,255,.18);border-color:rgba(185,164,255,.55);box-shadow:0 0 20px rgba(185,164,255,.12)}

.loading{text-align:center;color:var(--dim);font-size:.8rem;padding:20px 0}
.divider{height:1px;background:var(--line);margin:24px 0}
.footer{text-align:center;color:var(--dim);font-size:.7rem;line-height:1.7}
.footer a{color:var(--dim);text-decoration:underline;text-underline-offset:3px}
.footer a:hover{color:var(--text)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><span class="brand-dot">●</span>ORLIX</div>
  <div class="login-title">Sign in</div>
  <div class="login-sub">Connect to your personal AI operating system.</div>

  <div id="privy-root"><div class="loading"><span class="spin">◌</span> Loading…</div></div>

  <div class="divider"></div>
  <div class="footer">
    By connecting you agree to our <a href="/terms">Terms</a> &amp; <a href="/privacy">Privacy</a>.<br>
    <a href="/">← back to homepage</a>
  </div>
</div>

<script>
// Already logged in?
if (localStorage.getItem('orlix_token')) location.replace('/app');
</script>

<script type="module">
import { createElement as h, useState, useEffect } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
import { PrivyProvider, usePrivy } from 'https://esm.sh/@privy-io/react-auth@2?deps=react@18.3.1,react-dom@18.3.1';

function Buttons() {
  const { ready, authenticated, user, login, getAccessToken } = usePrivy();

  useEffect(() => {
    if (!ready || !authenticated || !user) return;
    (async () => {
      try {
        const token  = await getAccessToken();
        const accts  = user.linkedAccounts || [];
        const tw     = accts.find(a => a.type === 'twitter_oauth');
        const wl     = accts.find(a => a.type === 'wallet');
        const display = tw ? '@' + tw.username
                      : wl ? wl.address.slice(0,6) + '…' + wl.address.slice(-4)
                      : user.id?.slice(0, 12) || 'user';
        localStorage.setItem('orlix_token', 'privy:' + token);
        localStorage.setItem('orlix_user',  JSON.stringify({
          id: user.id, display,
          type: tw ? 'twitter' : wl ? 'wallet' : 'other',
        }));
        window.location.href = '/app';
      } catch(e) { console.error('save session:', e); }
    })();
  }, [ready, authenticated, user]);

  if (!ready || (authenticated && user)) {
    return h('div', { className: 'loading' }, h('span', { className: 'spin' }, '◌'), ' Signing in…');
  }

  return h('div', null,
    h('button', { className: 'btn btn-x', onClick: login },
      h('span', null, '𝕏'), h('span', null, 'Continue with X')
    ),
    h('button', { className: 'btn btn-w', onClick: login },
      h('span', null, '⬡'), h('span', null, 'Connect Wallet')
    )
  );
}

function App() {
  return h(PrivyProvider, {
    appId:    'cmqh5fvyg00co0ci68birz0s2',
    clientId: 'client-WY6aRspZ68mzwa8hexMRYu9xiCKWRkscPMKYYu3oayZ99',
    config: {
      loginMethods: ['twitter', 'wallet'],
      appearance:   { theme: 'dark', accentColor: '#ff9a52' },
      embeddedWallets: { createOnLogin: 'off' },
    },
  }, h(Buttons));
}

createRoot(document.getElementById('privy-root')).render(h(App));
</script>
</body>
</html>
