<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orlix AI — Sign In</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090B;--bg-2:#111113;--bg-3:#1A1A1E;
  --border:rgba(255,255,255,.06);--border-bright:rgba(255,255,255,.12);
  --text-1:#FAFAFA;--text-2:#A1A1AA;--text-3:#52525B;
  --orange:#F07830;--orange-dim:rgba(240,120,48,.1);--orange-glow:rgba(240,120,48,.18);
  --purple:#A78BFA;--purple-dim:rgba(167,139,250,.08);
  --green:#4ADE80;--red:#F87171;
  /* compat aliases */
  --text:var(--text-2);--bright:var(--text-1);--dim:var(--text-3);
  --amber:var(--orange);--amber-soft:var(--orange-dim);
  --violet:var(--purple);--line:var(--border);--line-bright:var(--border-bright);
  --mono:'JetBrains Mono',monospace;--font:'Plus Jakarta Sans',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text-2);min-height:100%}
body{font-family:var(--font);font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;min-height:100vh}

body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:40px 40px;animation:gridScroll 32s linear infinite}
@keyframes gridScroll{to{background-position:40px 40px}}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(240,120,48,.05) 0%,transparent 70%)}

/* ── login card ── */
.card{position:relative;z-index:1;width:100%;max-width:360px;margin:20px;
  background:rgba(17,17,23,.98);border:1px solid var(--border-bright);border-radius:16px;
  padding:36px 32px 32px;box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 24px 64px rgba(0,0,0,.7)}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--font);font-weight:800;
  font-size:.88rem;letter-spacing:-.01em;color:var(--text-1);margin-bottom:28px}
.brand img{width:22px;height:22px;border-radius:50%;object-fit:cover}
.brand-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);box-shadow:0 0 6px var(--orange-glow);flex-shrink:0}
.login-title{font-family:var(--font);font-size:1.35rem;font-weight:800;letter-spacing:-.02em;color:var(--text-1);margin-bottom:6px}
.login-sub{color:var(--text-3);font-size:.77rem;margin-bottom:28px;line-height:1.6}
.divider{height:1px;background:var(--border);margin:20px 0}
.footer{text-align:center;color:var(--text-3);font-size:.69rem;line-height:1.75}
.footer a{color:var(--text-3);text-decoration:underline;text-underline-offset:3px;transition:color .15s}
.footer a:hover{color:var(--text-2)}

/* ── main button ── */
.btn-main{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  padding:13px 18px;border-radius:10px;font-size:.83rem;font-family:var(--font);
  font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.01em;
  background:var(--orange-dim);border:1px solid rgba(240,120,48,.35);color:var(--text-1)}
.btn-main:hover{background:var(--orange);border-color:var(--orange);color:#fff}
.btn-main:disabled{opacity:.4;cursor:not-allowed}

/* ── msg ── */
.msg{margin-top:14px;font-size:.74rem;text-align:center;line-height:1.5;display:none}
.msg-err{color:var(--red)}.msg-ok{color:var(--text-3)}

/* ── wallet modal overlay ── */
.wm-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;padding:20px}
.wm-overlay.open{display:flex}
.wm-box{background:#0F0F12;border:1px solid var(--border-bright);border-radius:16px;
  padding:26px 22px 22px;width:100%;max-width:320px;position:relative;
  box-shadow:0 24px 64px rgba(0,0,0,.7)}
.wm-close{position:absolute;top:12px;right:14px;background:none;border:none;
  color:var(--text-3);font-size:1.3rem;cursor:pointer;line-height:1;padding:2px 6px;
  border-radius:4px;transition:.15s}
.wm-close:hover{color:var(--text-1);background:rgba(255,255,255,.07)}
.wm-title{color:var(--text-1);font-family:var(--font);font-size:1.05rem;font-weight:800;
  letter-spacing:-.02em;margin-bottom:4px}
.wm-sub{color:var(--text-3);font-size:.72rem;margin-bottom:20px}

/* ── wallet option rows ── */
.wo{display:flex;align-items:center;gap:13px;width:100%;padding:12px 14px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;
  color:var(--text-1);font-family:var(--font);font-size:.82rem;font-weight:500;
  cursor:pointer;transition:.15s;margin-bottom:8px;text-align:left}
.wo:last-of-type{margin-bottom:0}
.wo:hover{background:rgba(255,255,255,.07);border-color:var(--border-bright)}
.wo:disabled{opacity:.4;cursor:not-allowed}
.wo-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem}
.wo-right{display:flex;flex-direction:column;gap:1px}
.wo-name{color:var(--text-1);font-size:.83rem;font-weight:600}
.wo-desc{color:var(--text-3);font-size:.68rem;font-weight:400}

.wm-msg{font-size:.73rem;text-align:center;margin-top:12px;line-height:1.5;display:none}
.wm-msg-err{color:var(--red)}.wm-msg-ok{color:var(--text-3)}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
</style>
</head>
<body>

<div class="card">
  <div class="brand"><span class="brand-dot">●</span>ORLIX</div>
  <div class="login-title">Sign in</div>
  <div class="login-sub">Connect your wallet to access your personal AI operating system.</div>

  <button class="btn-main" id="btnSignIn" onclick="openModal()">
    <span style="font-size:1rem">⬡</span>
    <span id="lblSignIn">Connect Wallet</span>
  </button>

  <div id="msgErr" class="msg msg-err"></div>
  <div id="msgOk"  class="msg msg-ok"></div>

  <div class="divider"></div>
  <div class="footer">
    By connecting you agree to our <a href="/terms">Terms</a> &amp; <a href="/privacy">Privacy</a>.<br>
    <a href="/">← back to homepage</a>
  </div>
</div>

<!-- Wallet selection modal -->
<div class="wm-overlay" id="walletModal" onclick="onOverlayClick(event)">
  <div class="wm-box">
    <button class="wm-close" onclick="closeModal()">×</button>
    <div class="wm-title">Connect Wallet</div>
    <div class="wm-sub">Choose your wallet to sign in</div>

    <!-- MetaMask -->
    <button class="wo" id="woMM" onclick="connectMM()">
      <div class="wo-icon" style="background:rgba(255,154,82,.1);border:1px solid rgba(255,154,82,.2)">
        <svg width="20" height="20" viewBox="0 0 318.6 318.6" fill="none" xmlns="http://www.w3.org/2000/svg">

          <polygon fill="#CD6116" stroke="#CD6116" stroke-linecap="round" stroke-linejoin="round" points="211.8,247.4 177.9,230.9 180.6,253 180.3,262.3"/>
          <polygon fill="#CD6116" stroke="#CD6116" stroke-linecap="round" stroke-linejoin="round" points="106.8,247.4 138.3,262.3 138.1,253 140.6,230.9"/>
          <polygon fill="#E4751F" stroke="#E4751F" stroke-linecap="round" stroke-linejoin="round" points="138.8,193.5 110.6,185.2 130.5,176.1"/>
          <polygon fill="#E4751F" stroke="#E4751F" stroke-linecap="round" stroke-linejoin="round" points="179.7,193.5 188,176.1 208,185.2"/>
          <polygon fill="#F6851B" stroke="#F6851B" stroke-linecap="round" stroke-linejoin="round" points="106.8,247.4 111.6,206.8 80.3,207.7"/>
          <polygon fill="#F6851B" stroke="#F6851B" stroke-linecap="round" stroke-linejoin="round" points="207,206.8 211.8,247.4 238.3,207.7"/>
          <polygon fill="#F6851B" stroke="#F6851B" stroke-linecap="round" stroke-linejoin="round" points="230.8,162.1 174.6,164.6 179.8,193.5 208,185.2 219.3,175.4"/>

        </svg>
      </div>
      <div class="wo-right">
        <div class="wo-name">MetaMask</div>
        <div class="wo-desc">Connect MetaMask wallet</div>
      </div>
    </button>

    <!-- Coinbase Wallet -->
    <button class="wo" id="woCB" onclick="connectCoinbase()">
      <div class="wo-icon" style="background:rgba(0,82,255,.1);border:1px solid rgba(0,82,255,.25)">
        <svg width="20" height="20" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="16" fill="#0052FF"/>
          <path fill-rule="evenodd" clip-rule="evenodd" d="M16 28C22.6274 28 28 22.6274 28 16C28 9.37258 22.6274 4 16 4C9.37258 4 4 9.37258 4 16C4 22.6274 9.37258 28 16 28ZM13 12.5C12.6716 12.5 12.5 12.6716 12.5 13V19C12.5 19.3284 12.6716 19.5 13 19.5H19C19.3284 19.5 19.5 19.3284 19.5 19V13C19.5 12.6716 19.3284 12.5 19 12.5H13Z" fill="white"/>
        </svg>
      </div>
      <div class="wo-right">
        <div class="wo-name">Coinbase Wallet</div>
        <div class="wo-desc">Connect Coinbase Wallet</div>
      </div>
    </button>

    <!-- Other wallets -->
    <button class="wo" id="woOther" onclick="connectOther()">
      <div class="wo-icon" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:var(--dim)">
          <rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
      </div>
      <div class="wo-right">
        <div class="wo-name">Other wallets</div>
        <div class="wo-desc">Rainbow, Trust, Phantom…</div>
      </div>
    </button>

    <div id="wmErr" class="wm-msg wm-msg-err"></div>
    <div id="wmOk"  class="wm-msg wm-msg-ok"></div>
  </div>
</div>

<script>
const IS_MOBILE = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

if (localStorage.getItem('orlix_token')) location.replace('/app');

function openModal()  { document.getElementById('walletModal').classList.add('open'); }
function closeModal() { document.getElementById('walletModal').classList.remove('open'); }
function onOverlayClick(e) { if (e.target === document.getElementById('walletModal')) closeModal(); }

function wmErr(msg) {
  const e = document.getElementById('wmErr'), o = document.getElementById('wmOk');
  e.innerHTML = msg; e.style.display = 'block'; o.style.display = 'none';
  setModalBusy(false);
}
function wmOk(msg) {
  const e = document.getElementById('wmErr'), o = document.getElementById('wmOk');
  o.innerHTML = '<span class="spin">◌</span> ' + msg;
  o.style.display = 'block'; e.style.display = 'none';
}
function setModalBusy(b) {
  ['woMM','woCB','woOther'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = b;
  });
}

function getMetaMask() {
  if (!window.ethereum) return null;
  if (window.ethereum.isMetaMask) return window.ethereum;
  const p = window.ethereum.providers;
  return p ? (p.find(x => x.isMetaMask) || null) : null;
}
function getCoinbase() {
  if (!window.ethereum) return null;
  if (window.ethereum.isCoinbaseWallet) return window.ethereum;
  const p = window.ethereum.providers;
  return p ? (p.find(x => x.isCoinbaseWallet) || null) : null;
}
function getAny() { return window.ethereum || null; }

async function doWalletLogin(provider) {
  setModalBusy(true);
  wmOk('Connecting wallet…');
  try {
    const accounts = await provider.request({ method: 'eth_requestAccounts' });
    const address  = accounts[0];
    const display  = address.slice(0,6) + '…' + address.slice(-4);
    localStorage.setItem('orlix_token', 'wallet:' + address);
    localStorage.setItem('orlix_user',  JSON.stringify({ id: address, display, type: 'wallet', address }));
    window.location.href = '/app';
  } catch (e) {
    wmErr(e.code === 4001 ? 'Request rejected.' : 'Wallet error: ' + e.message);
  }
}

async function connectMM() {
  const prov = getMetaMask();
  if (!prov) {
    if (IS_MOBILE) {
      wmErr('MetaMask not found. <a href="https://metamask.app.link/dapp/orlixai.xyz/login" style="color:var(--violet)">Open in MetaMask ↗</a>');
    } else {
      wmErr('MetaMask not installed. <a href="https://metamask.io/download" target="_blank" style="color:var(--violet)">Install MetaMask ↗</a>');
    }
    return;
  }
  await doWalletLogin(prov);
}

async function connectCoinbase() {
  const prov = getCoinbase();
  if (!prov) {
    if (IS_MOBILE) {
      wmErr('Coinbase Wallet not found. <a href="https://go.cb-wallet.io/dapp?url=https://orlixai.xyz/login" style="color:var(--violet)">Open in Coinbase ↗</a>');
    } else {
      wmErr('Coinbase Wallet not installed. <a href="https://www.coinbase.com/wallet/downloads" target="_blank" style="color:var(--violet)">Install Coinbase Wallet ↗</a>');
    }
    return;
  }
  await doWalletLogin(prov);
}

async function connectOther() {
  const prov = getAny();
  if (!prov) {
    wmErr('No wallet detected. Open this page inside your wallet\'s browser (Rainbow, Trust, Phantom…).');
    return;
  }
  await doWalletLogin(prov);
}

</script>

</body>
</html>
