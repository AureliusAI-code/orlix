<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Token Song Generator — Orlix</title>
<meta name="description" content="Generate a song for any Base token using real on-chain data and AI."/>
<link rel="icon" href="/favicon.ico"/>
<meta property="og:title" content="Token Song Generator — Orlix"/>
<meta property="og:description" content="Drop a token. Get a banger. Powered by real Base data + AI."/>
<meta property="og:image" content="https://www.orlixai.xyz/og-image.png"/>
<meta name="twitter:card" content="summary_large_image"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070A;--s1:#0C0C10;--s2:#101015;--s3:#16161C;--s4:#1C1C24;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);--b3:rgba(255,255,255,.16);
  --orange:#F07830;--orange-d:rgba(240,120,48,.12);--orange-g:rgba(240,120,48,.22);
  --purple:#A78BFA;--purple-d:rgba(167,139,250,.1);
  --green:#22C55E;--green-d:rgba(34,197,94,.1);
  --red:#EF4444;--yellow:#EAB308;
  --t1:#F1F1F3;--t2:#9CA3AF;--t3:#52525B;
  --mono:'JetBrains Mono',monospace;--font:'Plus Jakarta Sans',sans-serif;
}
*{-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--t2);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── NAV ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;height:52px;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(7,7,10,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);
}
.nav-brand{font-weight:800;font-size:.9rem;color:var(--t1);text-decoration:none;letter-spacing:-.01em}
.nav-links{display:flex;gap:18px}
.nav-links a{color:var(--t3);font-size:.78rem;text-decoration:none;transition:color .15s}
.nav-links a:hover{color:var(--t1)}

/* ── PAGE ── */
.page{min-height:100vh;padding:80px 20px 60px;display:flex;flex-direction:column;align-items:center}

/* ── HERO ── */
.hero{text-align:center;margin-bottom:40px;max-width:540px}
.hero-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--purple-d);border:1px solid rgba(167,139,250,.2);
  border-radius:99px;padding:4px 14px;
  font-size:.72rem;font-weight:700;color:var(--purple);letter-spacing:.08em;
  margin-bottom:18px;
}
.hero-title{
  font-size:clamp(2rem,7vw,3.2rem);font-weight:800;color:var(--t1);
  line-height:1.08;letter-spacing:-.03em;margin-bottom:14px;
}
.hero-title span{
  background:linear-gradient(135deg,var(--orange),var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{font-size:.92rem;color:var(--t2);line-height:1.65;max-width:400px;margin:0 auto}

/* ── INPUT CARD ── */
.card{
  width:min(540px,100%);
  background:var(--s1);border:1px solid var(--b1);border-radius:18px;
  padding:24px;margin-bottom:28px;
}

.field{margin-bottom:18px}
.field-label{display:block;font-size:.72rem;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.field-input{
  width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:10px;
  padding:11px 14px;font-size:.88rem;color:var(--t1);font-family:var(--mono);
  outline:none;transition:border-color .15s;
}
.field-input::placeholder{color:var(--t3)}
.field-input:focus{border-color:rgba(240,120,48,.5);box-shadow:0 0 0 3px rgba(240,120,48,.07)}

/* genre grid */
.genre-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.genre-btn{
  padding:9px 6px;border-radius:9px;border:1px solid var(--b1);
  background:var(--s2);color:var(--t2);font-size:.78rem;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:all .15s;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.genre-btn .g-ico{font-size:1.2rem}
.genre-btn:hover{border-color:var(--b3);color:var(--t1)}
.genre-btn.active{border-color:var(--orange);background:var(--orange-d);color:var(--orange)}

/* generate button */
.gen-btn{
  width:100%;padding:14px;border-radius:11px;border:none;cursor:pointer;
  font-family:var(--font);font-weight:800;font-size:1rem;
  background:linear-gradient(135deg,var(--orange),var(--yellow));color:#000;
  transition:opacity .15s,transform .15s;letter-spacing:.01em;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.gen-btn:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.gen-btn:disabled{opacity:.5;cursor:default;transform:none}
.gen-btn .btn-ico{font-size:1.1rem}

/* token info chip */
.token-chip{
  display:flex;align-items:center;gap:10px;
  background:var(--s2);border:1px solid var(--b1);border-radius:10px;
  padding:10px 14px;margin-bottom:18px;
}
.tc-logo{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--s4)}
.tc-ini{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.tc-info{flex:1;min-width:0}
.tc-sym{font-weight:800;font-size:.88rem;color:var(--t1)}
.tc-name{font-size:.72rem;color:var(--t3);margin-top:1px}
.tc-stats{display:flex;gap:12px;margin-left:auto;flex-shrink:0}
.tc-stat{text-align:right}
.tc-sv{font-family:var(--mono);font-size:.78rem;color:var(--t1)}
.tc-sl{font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.pos{color:var(--green)}.neg{color:var(--red)}

/* ── LYRICS ── */
.lyrics-card{
  width:min(540px,100%);
  background:var(--s1);border:1px solid var(--b1);border-radius:18px;
  padding:28px;
  display:none;
}
.lyrics-card.show{display:block;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.lyrics-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.lyrics-title{font-size:1rem;font-weight:800;color:var(--t1)}
.genre-tag{
  font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:6px;letter-spacing:.08em;text-transform:uppercase;
}

.lyrics-body{
  font-family:var(--mono);font-size:.82rem;line-height:1.85;color:var(--t2);
  white-space:pre-wrap;
}
.lyrics-body .section-label{
  display:block;font-size:.68rem;font-weight:700;color:var(--orange);
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;margin-top:18px;
}
.lyrics-body .section-label:first-child{margin-top:0}
.lyrics-body .lyric-line{
  display:block;color:var(--t1);font-size:.85rem;line-height:1.9;
  animation:lineIn .3s ease both;
}
@keyframes lineIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}

/* loading */
.loading-state{
  display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 20px;
}
.loading-rings{position:relative;width:52px;height:52px}
.ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;animation:ringSpin linear infinite}
.ring1{border-top-color:var(--orange);animation-duration:.9s}
.ring2{inset:7px;border-top-color:var(--purple);animation-duration:1.4s;animation-direction:reverse}
.ring3{inset:14px;border-top-color:var(--yellow);animation-duration:1.9s}
@keyframes ringSpin{to{transform:rotate(360deg)}}
.loading-label{font-size:.82rem;color:var(--t2)}
.loading-sub{font-size:.72rem;color:var(--t3);font-family:var(--mono)}

/* actions */
.lyrics-actions{display:flex;gap:8px;margin-top:24px;flex-wrap:wrap}
.act-btn{
  display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;
  border:1px solid var(--b1);background:var(--s2);color:var(--t2);
  font-size:.78rem;font-weight:600;cursor:pointer;font-family:var(--font);
  transition:all .15s;text-decoration:none;
}
.act-btn:hover{border-color:var(--b2);color:var(--t1);background:rgba(255,255,255,.05)}
.act-btn.primary{background:var(--orange);border-color:var(--orange);color:#000}
.act-btn.primary:hover{opacity:.85}

/* error */
.err-state{text-align:center;padding:32px;color:var(--red);font-size:.85rem}

/* ── EXAMPLES ── */
.examples{
  width:min(540px,100%);margin-bottom:28px;
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
}
.ex-chip{
  padding:5px 14px;border-radius:99px;background:var(--s2);border:1px solid var(--b1);
  color:var(--t2);font-size:.75rem;cursor:pointer;transition:all .15s;
  font-family:var(--mono);
}
.ex-chip:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-d)}

@media(max-width:480px){
  .genre-grid{grid-template-columns:repeat(2,1fr)}
  .tc-stats{display:none}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/">orlix</a>
  <div class="nav-links">
    <a href="/control-room">control room</a>
    <a href="/app">app</a>
    <a href="/token">$ORLIX</a>
  </div>
</nav>

<main class="page">

  <div class="hero">
    <div class="hero-tag">✦ AI Song Generator</div>
    <h1 class="hero-title">Every token<br>deserves a <span>banger</span></h1>
    <p class="hero-sub">Drop any Base token. We pull the real on-chain data and write a custom song for it — price action, volume, buy pressure, all in the lyrics.</p>
  </div>

  <!-- quick examples -->
  <div class="examples" id="examples">
    <div class="ex-chip" onclick="setExample('BRETT')">$BRETT</div>
    <div class="ex-chip" onclick="setExample('DEGEN')">$DEGEN</div>
    <div class="ex-chip" onclick="setExample('TOSHI')">$TOSHI</div>
    <div class="ex-chip" onclick="setExample('AERO')">$AERO</div>
    <div class="ex-chip" onclick="setExample('MOG')">$MOG</div>
    <div class="ex-chip" onclick="setExample('VIRTUAL')">$VIRTUAL</div>
  </div>

  <!-- input card -->
  <div class="card">
    <div class="field">
      <label class="field-label" for="token-inp">Token name, ticker, or address</label>
      <input class="field-input" id="token-inp" type="text" placeholder="e.g. BRETT, $DEGEN, 0x4ed4…" autocomplete="off" autocorrect="off" spellcheck="false"/>
    </div>

    <div class="field">
      <label class="field-label">Genre</label>
      <div class="genre-grid">
        <button class="genre-btn active" data-genre="trap" onclick="setGenre('trap',this)"><span class="g-ico">🎤</span>Trap</button>
        <button class="genre-btn" data-genre="phonk" onclick="setGenre('phonk',this)"><span class="g-ico">🌑</span>Phonk</button>
        <button class="genre-btn" data-genre="pop" onclick="setGenre('pop',this)"><span class="g-ico">🌟</span>Pop</button>
        <button class="genre-btn" data-genre="drill" onclick="setGenre('drill',this)"><span class="g-ico">🔫</span>Drill</button>
        <button class="genre-btn" data-genre="hype" onclick="setGenre('hype',this)"><span class="g-ico">⚡</span>Hype</button>
        <button class="genre-btn" data-genre="ballad" onclick="setGenre('ballad',this)"><span class="g-ico">🌙</span>Ballad</button>
      </div>
    </div>

    <button class="gen-btn" id="gen-btn" onclick="generate()">
      <span class="btn-ico">🎵</span> Generate Song
    </button>
  </div>

  <!-- lyrics output -->
  <div class="lyrics-card" id="lyrics-card">
    <div class="lyrics-header">
      <div class="lyrics-title" id="lyrics-title">Song for $TOKEN</div>
      <span class="genre-tag" id="genre-tag" style="background:var(--orange-d);color:var(--orange)">TRAP</span>
    </div>
    <!-- token chip -->
    <div class="token-chip" id="token-chip" style="display:none"></div>
    <!-- body (loading / lyrics) -->
    <div id="lyrics-body-wrap"></div>
    <!-- actions -->
    <div class="lyrics-actions" id="lyrics-actions" style="display:none">
      <button class="act-btn primary" onclick="shareTwitter()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.26 5.638L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Share on X
      </button>
      <button class="act-btn" onclick="copyLyrics()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Lyrics
      </button>
      <button class="act-btn" onclick="generateAnother()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Regenerate
      </button>
    </div>
  </div>

</main>

<script>
const GENRE_COLORS = {
  trap:   ['var(--orange-d)','var(--orange)'],
  phonk:  ['rgba(167,139,250,.1)','var(--purple)'],
  pop:    ['rgba(250,204,21,.1)','var(--yellow)'],
  drill:  ['rgba(239,68,68,.1)','var(--red)'],
  hype:   ['rgba(34,197,94,.1)','var(--green)'],
  ballad: ['rgba(96,165,250,.1)','#60A5FA'],
};

let selectedGenre = 'trap';
let currentLyrics = '';
let currentToken = null;

function setGenre(g, el) {
  selectedGenre = g;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function setExample(sym) {
  document.getElementById('token-inp').value = sym;
  document.getElementById('token-inp').focus();
}

function logoColor(sym) {
  const colors = [
    ['#F07830','#1a0d07'],['#A78BFA','#0d0a1a'],['#22C55E','#071a0d'],
    ['#3B82F6','#070d1a'],['#EAB308','#1a170a'],['#EF4444','#1a0707'],
    ['#14B8A6','#071a13'],['#FB923C','#1a0e07']
  ];
  let h=0; for(let i=0;i<(sym||'').length;i++) h=(h*31+sym.charCodeAt(i))&0xFFFFFF;
  return colors[h%colors.length];
}

function fmtPrice(n) {
  if (!n) return '—';
  if (n < 0.000001) return '$' + n.toExponential(2);
  if (n < 0.001) return '$' + n.toFixed(7);
  if (n < 1) return '$' + n.toFixed(4);
  if (n < 100) return '$' + n.toFixed(2);
  return '$' + n.toFixed(0);
}
function fmtN(n) {
  if (!n) return '—';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}
function fmtChg(n) {
  if (n == null) return null;
  return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
}

function renderTokenChip(token) {
  if (!token?.symbol) return;
  const [clr, bg] = logoColor(token.symbol);
  const logoUrl = `https://dd.dexscreener.com/ds-data/tokens/base/${(token.address||'').toLowerCase()}.png`;
  const chg = fmtChg(token.priceChange24h);
  const chgCls = token.priceChange24h > 0 ? 'pos' : token.priceChange24h < 0 ? 'neg' : '';

  document.getElementById('token-chip').style.display = 'flex';
  document.getElementById('token-chip').innerHTML = `
    <img class="tc-logo" src="${logoUrl}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
    <div class="tc-ini" style="display:none;background:${bg};color:${clr}">${token.symbol.slice(0,3)}</div>
    <div class="tc-info">
      <div class="tc-sym">$${token.symbol}</div>
      <div class="tc-name">${token.name}</div>
    </div>
    <div class="tc-stats">
      <div class="tc-stat">
        <div class="tc-sv">${fmtPrice(token.priceUsd)}</div>
        <div class="tc-sl">Price</div>
      </div>
      ${chg ? `<div class="tc-stat">
        <div class="tc-sv ${chgCls}">${chg}</div>
        <div class="tc-sl">24h</div>
      </div>` : ''}
      <div class="tc-stat">
        <div class="tc-sv">${fmtN(token.volume24h)}</div>
        <div class="tc-sl">Vol 24h</div>
      </div>
    </div>`;
}

function renderLyrics(text) {
  // Parse [Section] labels and lines
  const lines = text.split('\n');
  let html = '';
  let delay = 0;
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) { html += '<br/>'; continue; }
    if (/^\[.+\]$/.test(trimmed)) {
      html += `<span class="section-label">${trimmed.slice(1,-1)}</span>`;
    } else {
      html += `<span class="lyric-line" style="animation-delay:${delay}ms">${escHtml(trimmed)}</span>`;
      delay += 40;
    }
  }
  document.getElementById('lyrics-body-wrap').innerHTML = `<div class="lyrics-body">${html}</div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showLoading(query) {
  const msgs = [
    'Fetching on-chain data…',
    `Analyzing $${query.toUpperCase().replace('$','')} on Base…`,
    'Writing bars…',
    'Cooking the beat…',
  ];
  let i = 0;
  const el = document.getElementById('lyrics-body-wrap');
  el.innerHTML = `<div class="loading-state">
    <div class="loading-rings">
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
    </div>
    <div class="loading-label" id="load-msg">${msgs[0]}</div>
    <div class="loading-sub" id="load-sub">powered by Orlix AI</div>
  </div>`;
  const interval = setInterval(() => {
    i = (i+1) % msgs.length;
    const m = document.getElementById('load-msg');
    if (m) m.textContent = msgs[i];
  }, 1200);
  return () => clearInterval(interval);
}

async function generate() {
  const query = document.getElementById('token-inp').value.trim();
  if (!query) {
    document.getElementById('token-inp').focus();
    document.getElementById('token-inp').style.borderColor = 'var(--red)';
    setTimeout(() => { document.getElementById('token-inp').style.borderColor = ''; }, 1500);
    return;
  }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-ico">⏳</span> Generating…';

  const card = document.getElementById('lyrics-card');
  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  document.getElementById('lyrics-actions').style.display = 'none';
  document.getElementById('token-chip').style.display = 'none';

  const stopLoading = showLoading(query);

  try {
    const res = await fetch('/api/song', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, genre: selectedGenre }),
    });

    stopLoading();

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Unknown error' }));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    currentLyrics = data.lyrics;
    currentToken = data.token;

    // Update header
    const sym = data.token?.symbol || query.toUpperCase().replace('$','');
    document.getElementById('lyrics-title').textContent = `Song for $${sym}`;

    const [gbg, gclr] = GENRE_COLORS[selectedGenre] || GENRE_COLORS.trap;
    const genreTag = document.getElementById('genre-tag');
    genreTag.textContent = selectedGenre.toUpperCase();
    genreTag.style.background = gbg;
    genreTag.style.color = gclr;

    renderTokenChip(data.token);
    renderLyrics(data.lyrics);
    document.getElementById('lyrics-actions').style.display = 'flex';

  } catch (e) {
    stopLoading();
    document.getElementById('lyrics-body-wrap').innerHTML =
      `<div class="err-state">⚠ ${escHtml(String(e.message || e))}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-ico">🎵</span> Generate Song';
  }
}

function generateAnother() {
  generate();
}

function shareTwitter() {
  if (!currentLyrics) return;
  const sym = currentToken?.symbol || 'TOKEN';
  const genre = selectedGenre.toUpperCase();

  // Take first 4 lyric lines for tweet
  const lines = currentLyrics.split('\n')
    .filter(l => l.trim() && !/^\[/.test(l.trim()))
    .slice(0, 4)
    .join('\n');

  const tweet = `🎵 AI just wrote a ${genre} song for $${sym} on Base\n\n${lines}\n\n(fr tho check the chart)\n\norlixai.xyz/song`;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(tweet), '_blank', 'noopener');
}

function copyLyrics() {
  if (!currentLyrics) return;
  const sym = currentToken?.symbol || 'TOKEN';
  const text = `🎵 ${sym} Song (${selectedGenre} | generated by Orlix AI)\n\n${currentLyrics}\n\norlixai.xyz/song`;
  navigator.clipboard?.writeText(text).then(() => {
    const btn = document.querySelector('.act-btn:not(.primary)');
    if (btn) { const orig = btn.innerHTML; btn.innerHTML = '✓ Copied!'; setTimeout(() => btn.innerHTML = orig, 2000); }
  }).catch(() => {});
}

// Enter key on input
document.getElementById('token-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>
</body>
