<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="#111111"/>

  <!-- White circle ring — 300° arc, 60° gap on left side -->
  <path d="M 17.1,31 A 38,38 0 1 1 17.1,69"
    fill="none" stroke="#FFFFFF" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Small upper-left stub -->
  <path d="M 12.6,40.2 A 38,38 0 0 1 17.1,31"
    fill="none" stroke="#FFFFFF" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Small lower-left stub -->
  <path d="M 17.1,69 A 38,38 0 0 1 12.6,59.8"
    fill="none" stroke="#FFFFFF" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Orange > chevron -->
  <polyline points="24,33 44,50 24,67"
    fill="none" stroke="#E07828" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- White | cursor line -->
  <line x1="50" y1="46" x2="50" y2="66" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>

  <!-- Orange _ underscore -->
  <line x1="54" y1="66" x2="76" y2="66" stroke="#E07828" stroke-width="6.5" stroke-linecap="round"/>
</svg>
