<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#111318"/>
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F07830;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E05A10;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#003FCC;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Subtle orange glow top left -->
  <circle cx="100" cy="100" r="200" fill="#F07830" opacity="0.04"/>
  <!-- Subtle blue glow bottom right -->
  <circle cx="1100" cy="580" r="220" fill="#0052FF" opacity="0.05"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#orangeGlow)" opacity="0.6"/>

  <!-- ─── HEADER ─── -->
  <!-- Orlix logo hex icon -->
  <g transform="translate(80, 52)">
    <polygon points="18,0 36,10 36,30 18,40 0,30 0,10" fill="#F07830" opacity="0.15" stroke="#F07830" stroke-width="1.5"/>
    <polygon points="18,8 28,13 28,27 18,32 8,27 8,13" fill="#F07830" opacity="0.4"/>
    <text x="18" y="25" font-family="monospace" font-size="11" fill="#F07830" text-anchor="middle" font-weight="bold">⬡</text>
  </g>

  <!-- Orlix AI wordmark -->
  <text x="128" y="76" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="1">ORLIX AI</text>

  <!-- Tagline -->
  <text x="128" y="97" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#888" letter-spacing="0.5">Personal AI Operating System on Base</text>

  <!-- B20 badge top right -->
  <rect x="1020" y="44" width="120" height="36" rx="18" fill="#0052FF" opacity="0.12" stroke="#0052FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1080" y="66" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#4D8BFF" text-anchor="middle" letter-spacing="2">B20 READY</text>

  <!-- Separator -->
  <line x1="80" y1="118" x2="1120" y2="118" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- ─── MAIN TITLE ─── -->
  <text x="600" y="178" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">The Complete B20 Toolkit</text>
  <text x="600" y="212" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#888" text-anchor="middle" letter-spacing="0.2">Studio · Open API · Agent Skill — deploy B20 tokens end-to-end</text>

  <!-- ─── THREE CARDS ─── -->

  <!-- Card 1: B20 Studio -->
  <g transform="translate(80, 250)">
    <rect width="320" height="200" rx="16" fill="#141418" stroke="#F07830" stroke-width="1" stroke-opacity="0.3"/>
    <rect width="320" height="4" rx="2" fill="url(#orangeGlow)" opacity="0.7"/>
    <!-- Icon -->
    <rect x="24" y="32" width="40" height="40" rx="10" fill="#F07830" opacity="0.12"/>
    <text x="44" y="57" font-size="20" text-anchor="middle" fill="#F07830">⬡</text>
    <!-- Label -->
    <text x="24" y="100" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">B20 Studio</text>
    <text x="24" y="122" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#888">Visual token configurator</text>
    <!-- Features -->
    <text x="24" y="152" font-family="monospace" font-size="12" fill="#F07830">→</text>
    <text x="40" y="152" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#AAA">Configure Asset &amp; Stablecoin variants</text>
    <text x="24" y="170" font-family="monospace" font-size="12" fill="#F07830">→</text>
    <text x="40" y="170" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#AAA">Supply caps, policies, metadata</text>
    <!-- URL -->
    <text x="24" y="194" font-family="monospace" font-size="11" fill="#F07830" opacity="0.7">orlixai.xyz/b20</text>
  </g>

  <!-- Card 2: Open API -->
  <g transform="translate(440, 250)">
    <rect width="320" height="200" rx="16" fill="#141418" stroke="#F07830" stroke-width="1" stroke-opacity="0.3"/>
    <rect width="320" height="4" rx="2" fill="url(#orangeGlow)" opacity="0.7"/>
    <!-- Icon -->
    <rect x="24" y="32" width="40" height="40" rx="10" fill="#F07830" opacity="0.12"/>
    <text x="44" y="57" font-size="18" text-anchor="middle" fill="#F07830">{ }</text>
    <!-- Label -->
    <text x="24" y="100" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Open API</text>
    <text x="24" y="122" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#888">Real Base RPC · No auth required</text>
    <!-- Features -->
    <text x="24" y="152" font-family="monospace" font-size="12" fill="#F07830">→</text>
    <text x="40" y="152" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#AAA">Live gas prices · admin balance check</text>
    <text x="24" y="170" font-family="monospace" font-size="12" fill="#F07830">→</text>
    <text x="40" y="170" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#AAA">ABI-encoded EIP-1559 deployment tx</text>
    <!-- URL -->
    <text x="24" y="194" font-family="monospace" font-size="11" fill="#F07830" opacity="0.7">orlixai.xyz/api/b20-skill</text>
  </g>

  <!-- Card 3: BANKR Skill -->
  <g transform="translate(800, 250)">
    <rect width="320" height="200" rx="16" fill="#141418" stroke="#F07830" stroke-width="1" stroke-opacity="0.3"/>
    <rect width="320" height="4" rx="2" fill="url(#orangeGlow)" opacity="0.7"/>
    <!-- Icon -->
    <rect x="24" y="32" width="40" height="40" rx="10" fill="#F07830" opacity="0.12"/>
    <text x="44" y="57" font-size="18" text-anchor="middle" fill="#F07830">⚡</text>
    <!-- Label -->
    <text x="24" y="100" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Agent Skill</text>
    <text x="24" y="122" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#888">BANKR-compatible · Natural language</text>
    <!-- Features -->
    <text x="24" y="152" font-family="monospace" font-size="12" fill="#F07830">→</text>
    <text x="40" y="152" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#AAA">Deploy via bankr prompt command</text>
    <text x="24" y="170" font-family="monospace" font-size="12" fill="#F07830">→</text>
    <text x="40" y="170" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#AAA">No Solidity · no ABIs · no setup</text>
    <!-- URL -->
    <text x="24" y="194" font-family="monospace" font-size="11" fill="#F07830" opacity="0.7">orlixai.xyz/b20-skills/SKILL.md</text>
  </g>

  <!-- ─── ARROW DOWN ─── -->
  <line x1="600" y1="458" x2="600" y2="488" stroke="#F07830" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <polygon points="594,486 606,486 600,496" fill="#F07830" opacity="0.4"/>

  <!-- ─── BASE BERYL BOTTOM BAR ─── -->
  <rect x="80" y="500" width="1040" height="64" rx="14" fill="#0052FF" opacity="0.06" stroke="#0052FF" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Base icon -->
  <circle cx="136" cy="532" r="16" fill="#0052FF" opacity="0.15" stroke="#0052FF" stroke-width="1" stroke-opacity="0.3"/>
  <text x="136" y="537" font-size="13" text-anchor="middle" fill="#4D8BFF" font-weight="bold">B</text>

  <text x="164" y="527" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Base Beryl</text>
  <text x="164" y="547" font-family="monospace" font-size="11" fill="#4D8BFF" opacity="0.8">B20 Factory · 0x4200000000000000000000000000000000000B20</text>

  <!-- Separator -->
  <line x1="420" y1="508" x2="420" y2="556" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Stats -->
  <text x="460" y="527" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#666">Asset Variant</text>
  <text x="460" y="547" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">6–18 decimals</text>

  <line x1="600" y1="508" x2="600" y2="556" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>

  <text x="640" y="527" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#666">Stablecoin Variant</text>
  <text x="640" y="547" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Fixed 6 decimals</text>

  <line x1="800" y1="508" x2="800" y2="556" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>

  <text x="840" y="527" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#666">Chain ID</text>
  <text x="840" y="547" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Base 8453</text>

  <line x1="960" y1="508" x2="960" y2="556" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>

  <text x="1000" y="527" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#666">ERC-20 Compatible</text>
  <text x="1000" y="547" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#4D8BFF">✓ Drop-in</text>

  <!-- ─── FOOTER ─── -->
  <text x="600" y="636" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#444" text-anchor="middle" letter-spacing="0.3">orlixai.xyz · @orlixai · $ORLIX</text>

  <!-- Bottom border -->
  <rect x="0" y="673" width="1200" height="2" fill="url(#orangeGlow)" opacity="0.3"/>
</svg>
