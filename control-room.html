<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orlix Control Room — Base Network Live</title>
<link rel="icon" href="/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070A; --s1:#0D0D12; --s2:#111118; --s3:#16161F;
  --b1:#1C1C26; --b2:#252532; --b3:#2E2E3E;
  --orange:#F07830; --green:#4ADE80; --yellow:#FBBF24;
  --red:#F87171; --purple:#A78BFA; --blue:#60A5FA;
  --text:#E5E7EB; --muted:#6B7280; --dim:#374151;
  --mono:'JetBrains Mono',monospace; --sans:'Plus Jakarta Sans',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}

/* HEADER */
.hdr{
  height:52px;display:flex;align-items:center;gap:14px;padding:0 20px;
  border-bottom:1px solid var(--b1);background:var(--s1);
  position:sticky;top:0;z-index:200;
}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;flex-shrink:0}
.logo img{width:24px;height:24px;border-radius:50%}
.logo-n{font-weight:800;font-size:13px;letter-spacing:.04em}
.logo-sep{color:var(--b2)}
.logo-cr{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:.12em}

.live-pill{display:flex;align-items:center;gap:5px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:99px;padding:3px 10px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--green);letter-spacing:.1em}

.hstats{display:flex;gap:18px;margin-left:auto}
.hs{text-align:center}
.hs-v{font-family:var(--mono);font-size:12px;font-weight:500;display:block;line-height:1.3}
.hs-l{font-size:8px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}

.hright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.status{font-family:var(--mono);font-size:10px;color:var(--muted)}
.btn{padding:5px 13px;border-radius:7px;font-size:11px;font-weight:600;text-decoration:none;display:inline-block;border:none;cursor:pointer;font-family:var(--sans);transition:opacity .15s}
.btn:hover{opacity:.8}
.btn-ghost{background:var(--b2);color:var(--muted)}.btn-ghost:hover{color:var(--text)}
.btn-orange{background:var(--orange);color:#fff}

/* FILTER BAR */
.filter-bar{
  display:flex;align-items:center;gap:8px;padding:10px 20px;
  border-bottom:1px solid var(--b1);background:var(--s1);
  position:sticky;top:52px;z-index:100;
}
.filter-lbl{font-size:11px;color:var(--muted);margin-right:4px}
.f-btn{padding:4px 12px;border-radius:99px;font-size:11px;font-weight:600;border:1px solid var(--b2);background:none;color:var(--muted);cursor:pointer;font-family:var(--sans);transition:all .15s}
.f-btn:hover{border-color:var(--b3);color:var(--text)}
.f-btn.active{border-color:var(--orange);color:var(--orange);background:rgba(240,120,48,.08)}
.f-sep{width:1px;height:16px;background:var(--b2);margin:0 4px}
.f-count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}

/* GRID */
.grid-wrap{padding:16px 20px;padding-bottom:60px}
.section-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--b1)}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:10px;
  margin-bottom:20px;
}

/* TOKEN CARD */
.tcard{
  background:var(--s2);border:1px solid var(--b1);border-radius:12px;
  padding:14px;cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .15s,transform .15s,box-shadow .15s;
  animation:cardIn .35s cubic-bezier(.34,1.3,.64,1);
}
.tcard:hover{border-color:var(--b3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
@keyframes cardIn{
  from{opacity:0;transform:scale(.92) translateY(8px)}
  to{opacity:1;transform:none}
}
.tcard.new-flash{animation:cardIn .35s cubic-bezier(.34,1.3,.64,1),cardFlash .8s ease forwards}
@keyframes cardFlash{
  0%{border-color:rgba(74,222,128,.6);box-shadow:0 0 12px rgba(74,222,128,.15)}
  100%{border-color:var(--b1);box-shadow:none}
}

/* Activity badge */
.act-badge{
  position:absolute;top:10px;right:10px;
  font-family:var(--mono);font-size:10px;font-weight:600;
  padding:3px 8px;border-radius:99px;
  white-space:nowrap;
}
.act-buy{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.act-sell{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.act-neu{background:var(--b2);color:var(--muted)}

/* Logo area */
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-right:60px}
.tok-logo{width:44px;height:44px;border-radius:50%;background:var(--b2);flex-shrink:0;object-fit:cover;border:1px solid var(--b1)}
.tok-ini{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;border:1px solid var(--b1);
}
.card-names{}
.card-sym{font-size:15px;font-weight:800;line-height:1.2;letter-spacing:-.01em}
.card-name{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}

/* Stats grid */
.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.cs{background:var(--bg);border-radius:6px;padding:5px 8px}
.cs-l{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.cs-v{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text)}

/* Buy/sell bar */
.bs-row{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.bs-bar{flex:1;height:3px;border-radius:2px;background:var(--b2);overflow:hidden}
.bs-fill{height:100%;background:var(--green);border-radius:2px}
.bs-lbl{font-family:var(--mono);font-size:9px;flex-shrink:0}
.bs-b{color:var(--green)}.bs-s{color:var(--red)}

/* Card footer */
.card-foot{display:flex;align-items:center;justify-content:space-between}
.card-age{font-family:var(--mono);font-size:9px;color:var(--dim)}
.card-links{display:flex;gap:6px}
.card-link{font-size:9px;color:var(--muted);text-decoration:none;padding:2px 6px;border-radius:4px;background:var(--b1);transition:color .15s}
.card-link:hover{color:var(--text)}

.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}

/* LOADING / EMPTY */
.sk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.sk{border-radius:12px;background:linear-gradient(90deg,var(--b1) 0%,var(--b2) 50%,var(--b1) 100%);background-size:200%;animation:shim 1.5s infinite;height:180px}
@keyframes shim{0%{background-position:-200% 0}100%{background-position:200% 0}}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-ico{font-size:32px;opacity:.2;margin-bottom:12px}
.empty-msg{font-size:13px}
.empty-sub{font-size:11px;color:var(--dim);margin-top:6px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(7,7,10,.88);backdrop-filter:blur(5px);z-index:300;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:14px;width:520px;max-width:calc(100vw - 32px);max-height:calc(100vh - 60px);display:flex;flex-direction:column;overflow:hidden;animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.m-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--b1)}
.m-ttl{font-size:15px;font-weight:700}
.m-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;line-height:1;transition:color .15s}.m-x:hover{color:var(--text)}
.m-body{padding:16px;overflow-y:auto;flex:1}
.m-foot{padding:12px 18px;border-top:1px solid var(--b1);display:flex;gap:8px}
.mbtn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;transition:opacity .15s}.mbtn:hover{opacity:.82}
.mbtn-g{background:var(--b2);color:var(--text)}
.mload{display:flex;flex-direction:column;align-items:center;gap:14px;padding:52px}
.spin{width:30px;height:30px;border:2px solid var(--b2);border-top-color:var(--orange);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mload-t{font-size:12px;color:var(--muted)}
.verdict{display:flex;align-items:center;justify-content:center;padding:11px;border-radius:9px;font-size:16px;font-weight:800;letter-spacing:.06em;margin-bottom:14px}
.v-safe{background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.v-caution{background:rgba(251,191,36,.08);color:var(--yellow);border:1px solid rgba(251,191,36,.2)}
.v-high{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.v-scam{background:rgba(248,113,113,.12);color:#ff5555;border:1px solid rgba(248,113,113,.3)}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.astat{background:var(--bg);border:1px solid var(--b1);border-radius:8px;padding:10px 12px}
.al{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.av{font-family:var(--mono);font-size:14px;font-weight:500}
.atext{font-size:12px;color:var(--muted);line-height:1.65;white-space:pre-wrap;background:var(--bg);border:1px solid var(--b1);border-radius:8px;padding:12px;max-height:240px;overflow-y:auto}
.aerr{color:var(--red);font-size:13px;text-align:center;padding:24px}

/* COMMENTARY */
.comm-bar{
  position:fixed;bottom:0;left:0;right:0;height:42px;
  display:flex;align-items:center;gap:10px;padding:0 20px;
  border-top:1px solid var(--b1);background:var(--s1);z-index:200;
}
.ai-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(167,139,250,.1);color:var(--purple);flex-shrink:0;letter-spacing:.08em}
.c-txt{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.c-time{font-family:var(--mono);font-size:10px;color:var(--b2);flex-shrink:0}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <a href="/" class="logo">
    <img src="/orlix-logo.png" alt="" onerror="this.style.display='none'" />
    <span class="logo-n">ORLIX</span>
    <span class="logo-sep">/</span>
    <span class="logo-cr">CONTROL ROOM</span>
  </a>
  <div class="live-pill">
    <div class="live-dot"></div>
    <span class="live-txt">LIVE</span>
  </div>

  <div class="hstats">
    <div class="hs"><span class="hs-v" id="s-count">—</span><span class="hs-l">Tokens Active</span></div>
    <div class="hs"><span class="hs-v" id="s-vol">—</span><span class="hs-l">Vol 1h Total</span></div>
    <div class="hs"><span class="hs-v" id="s-pairs">—</span><span class="hs-l">Pairs Scanned</span></div>
  </div>

  <div class="hright">
    <span class="status" id="status">Connecting...</span>
    <a href="/" class="btn btn-ghost">← Home</a>
    <a href="/app" class="btn btn-orange">Open App →</a>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-lbl">Filter:</span>
  <button class="f-btn active" onclick="setFilter('all',this)">All</button>
  <button class="f-btn" onclick="setFilter('safe',this)">Safe Only</button>
  <button class="f-btn" onclick="setFilter('hot',this)">Hot (1h vol)</button>
  <div class="f-sep"></div>
  <button class="f-btn" onclick="setFilter('new',this)">New Pairs</button>
  <span class="f-count" id="f-count">— tokens</span>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="section-title">Active on Base</div>
  <div class="cards-grid" id="cards-grid">
    <div class="sk"></div><div class="sk"></div><div class="sk"></div>
    <div class="sk"></div><div class="sk"></div><div class="sk"></div>
  </div>
</div>

<!-- COMMENTARY -->
<footer class="comm-bar">
  <span class="ai-tag">AI</span>
  <span class="c-txt" id="c-txt">Scanning Base network...</span>
  <span class="c-time" id="c-time"></span>
</footer>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="m-hd">
      <span class="m-ttl" id="m-ttl">Token Analysis</span>
      <button class="m-x" onclick="closeModal()">✕</button>
    </div>
    <div class="m-body" id="m-body"></div>
    <div class="m-foot">
      <a href="#" class="mbtn mbtn-g" id="m-dex" target="_blank" rel="noopener">DexScreener ↗</a>
      <a href="#" class="mbtn mbtn-g" id="m-scan" target="_blank" rel="noopener">Basescan ↗</a>
    </div>
  </div>
</div>

<script>
// ── utils ────────────────────────────────────────────────────────────────

function esc(s){
  if(typeof s!=='string')return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtUsd(n){
  if(n==null||isNaN(n)||n===0)return'—';
  if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';
  return'$'+n.toFixed(0);
}
function fmtChg(n){
  if(n==null||isNaN(n))return'—';
  return(n>=0?'+':'')+n.toFixed(2)+'%';
}
function cc(n){return n==null||isNaN(n)?'neu':n>=0?'pos':'neg'}
function fmtPrice(s){
  if(!s)return'—';
  const n=parseFloat(s);if(isNaN(n))return s;
  if(n<0.000001)return'$'+n.toExponential(2);
  if(n<0.001)return'$'+n.toFixed(8);
  if(n<1)return'$'+n.toFixed(6);
  if(n<100)return'$'+n.toFixed(4);
  return'$'+n.toFixed(2);
}
function fmtAgo(ts){
  if(!ts)return'';
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return s+'s ago';
  if(s<3600)return Math.floor(s/60)+'m ago';
  return Math.floor(s/3600)+'h ago';
}
function ini(name){
  if(!name)return'?';
  const w=name.trim().split(/\s+/);
  return(w.length>=2?w[0][0]+w[1][0]:name.slice(0,2)).toUpperCase();
}
function logoColor(sym){
  const colors=[
    ['#F07830','#1a0d07'],['#A78BFA','#0d0a1a'],['#4ADE80','#071a0d'],
    ['#60A5FA','#070d1a'],['#FBBF24','#1a170a'],['#F87171','#1a0707'],
    ['#34D399','#071a13'],['#FB923C','#1a0e07']
  ];
  let h=0;for(let i=0;i<(sym||'').length;i++)h=(h*31+sym.charCodeAt(i))&0xFFFFFF;
  return colors[h%colors.length];
}

// ── state ────────────────────────────────────────────────────────────────

let allTokens = [];
let seenAddrs = new Set();
let activeFilter = 'all';
let isFirstLoad = true;

// ── filter ───────────────────────────────────────────────────────────────

function setFilter(f, btn){
  activeFilter = f;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(allTokens, false);
}

function applyFilter(tokens){
  if(activeFilter === 'safe')
    return tokens.filter(t => (t.liquidity||0) >= 50000);
  if(activeFilter === 'hot')
    return tokens.filter(t => (t.volume1h||0) >= 5000).sort((a,b)=>(b.volume1h||0)-(a.volume1h||0));
  if(activeFilter === 'new'){
    const day = 86400000;
    return tokens.filter(t => t.pairCreatedAt && (Date.now()-t.pairCreatedAt) < 7*day)
      .sort((a,b)=>(b.pairCreatedAt||0)-(a.pairCreatedAt||0));
  }
  return tokens;
}

// ── card renderer ─────────────────────────────────────────────────────────

function buildCard(t, isNew){
  const sym = t.symbol || '???';
  const vol = t.volume1h || 0;
  const vol24 = t.volume24h || 0;
  const liq = t.liquidity || 0;
  const buys = t.buys1h || 0;
  const sells = t.sells1h || 0;
  const total = buys + sells;
  const buyPct = total > 0 ? Math.round(buys/total*100) : 50;
  const isBuyish = buyPct >= 50;
  const [clr, bg] = logoColor(sym);

  const actVol = vol > 0 ? fmtUsd(vol) : (vol24 > 0 ? fmtUsd(vol24/24) : null);
  const actCls = vol > 0 ? (isBuyish ? 'act-buy' : 'act-sell') : 'act-neu';
  const actTxt = actVol ? (isBuyish ? '↑ ' : '↓ ') + actVol : 'active';

  const logoUrl = `https://dd.dexscreener.com/ds-data/tokens/base/${(t.address||'').toLowerCase()}.png`;
  const logoHtml = `<img class="tok-logo" src="${esc(logoUrl)}" alt=""
    onerror="this.outerHTML='<div class=\\"tok-ini\\" style=\\"background:${bg};color:${clr}\\">${ini(t.name)}</div>'" />`;

  const age = t.pairCreatedAt ? fmtAgo(t.pairCreatedAt) : '';

  return `
    <div class="tcard${isNew?' new-flash':''}" onclick="openModal('${esc(t.address||'')}','${esc(sym)} — ${esc(t.name)}','${esc(t.pairUrl||'')}')">
      <div class="act-badge ${actCls}">${actTxt}</div>
      <div class="card-top">
        ${logoHtml}
        <div class="card-names">
          <div class="card-sym">$${esc(sym)}</div>
          <div class="card-name">${esc(t.name||'Unknown')}</div>
        </div>
      </div>
      <div class="card-stats">
        <div class="cs">
          <div class="cs-l">Liquidity</div>
          <div class="cs-v">${fmtUsd(liq)}</div>
        </div>
        <div class="cs">
          <div class="cs-l">Price</div>
          <div class="cs-v">${fmtPrice(t.priceUsd)}</div>
        </div>
        <div class="cs">
          <div class="cs-l">Vol 24h</div>
          <div class="cs-v">${fmtUsd(vol24)}</div>
        </div>
        <div class="cs">
          <div class="cs-l">24h Change</div>
          <div class="cs-v ${cc(t.priceChange24h)}">${fmtChg(t.priceChange24h)}</div>
        </div>
      </div>
      ${total > 0 ? `
      <div class="bs-row">
        <span class="bs-lbl bs-b">B${buys}</span>
        <div class="bs-bar"><div class="bs-fill" style="width:${buyPct}%"></div></div>
        <span class="bs-lbl bs-s">S${sells}</span>
      </div>` : ''}
      <div class="card-foot">
        <span class="card-age">${age}</span>
        <div class="card-links">
          <a class="card-link" href="${esc(t.pairUrl||'#')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">DEX</a>
          <a class="card-link" href="https://basescan.org/token/${esc(t.address||'')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Scan</a>
        </div>
      </div>
    </div>`;
}

function renderGrid(tokens, markNew){
  const filtered = applyFilter(tokens);
  document.getElementById('f-count').textContent = filtered.length + ' tokens';

  if(!filtered.length){
    document.getElementById('cards-grid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-ico">◌</div>
        <div class="empty-msg">No tokens match this filter</div>
        <div class="empty-sub">Try "All" filter</div>
      </div>`;
    return;
  }

  document.getElementById('cards-grid').innerHTML =
    filtered.map(t => buildCard(t, markNew && !seenAddrs.has(t.address))).join('');

  if(markNew) filtered.forEach(t => seenAddrs.add(t.address));
}

// ── modal ─────────────────────────────────────────────────────────────────

function openModal(address, name, pairUrl){
  if(!address) return;
  document.getElementById('m-ttl').textContent = name || address;
  document.getElementById('m-dex').href = pairUrl || `https://dexscreener.com/base/${address}`;
  document.getElementById('m-scan').href = `https://basescan.org/token/${address}`;
  document.getElementById('m-body').innerHTML =
    `<div class="mload"><div class="spin"></div><span class="mload-t">Analyzing on Base...</span></div>`;
  document.getElementById('overlay').classList.add('open');
  fetch(`/api/analyze?address=${encodeURIComponent(address)}`)
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(renderAnalysis)
    .catch(err=>{document.getElementById('m-body').innerHTML=`<div class="aerr">Failed: ${esc(String(err))}</div>`;});
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

function renderAnalysis(data){
  const d=data.dexInfo||{}, t=data.tokenInfo||{}, txt=data.analysis||'';
  let vcls='',vtxt='';
  if(/SCAM/i.test(txt)){vcls='v-scam';vtxt='SCAM LIKELY';}
  else if(/HIGH.?RISK/i.test(txt)){vcls='v-high';vtxt='HIGH RISK';}
  else if(/CAUTION/i.test(txt)){vcls='v-caution';vtxt='CAUTION';}
  else if(/SAFE/i.test(txt)){vcls='v-safe';vtxt='SAFE';}
  document.getElementById('m-body').innerHTML=`
    ${vcls?`<div class="verdict ${vcls}">${vtxt}</div>`:''}
    <div class="ag">
      <div class="astat"><div class="al">Symbol</div><div class="av">${esc(t.symbol||'—')}</div></div>
      <div class="astat"><div class="al">Price</div><div class="av">${fmtPrice(d.priceUsd)}</div></div>
      <div class="astat"><div class="al">Liquidity</div><div class="av">${fmtUsd(d.liquidityUsd)}</div></div>
      <div class="astat"><div class="al">Market Cap</div><div class="av">${fmtUsd(d.marketCap)}</div></div>
      <div class="astat"><div class="al">Vol 24h</div><div class="av">${fmtUsd(d.volume24h)}</div></div>
      <div class="astat"><div class="al">Liq/MCap</div><div class="av">${d.liqMcapRatio?d.liqMcapRatio+'%':'—'}</div></div>
    </div>
    <div class="atext">${esc(txt)}</div>`;
}

// ── fetch loop ────────────────────────────────────────────────────────────

let fetching = false, timer = null;

async function fetchData(){
  if(fetching) return;
  fetching = true;
  document.getElementById('status').textContent = 'Fetching...';
  try{
    const r = await fetch('/api/control-room');
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();

    allTokens = data.liveActivity || [];

    // Stats
    const vol1h = allTokens.reduce((s,t)=>s+(t.volume1h||0),0);
    document.getElementById('s-count').textContent = allTokens.length || '—';
    document.getElementById('s-vol').textContent = fmtUsd(vol1h) || fmtUsd(data.stats?.totalVolume1h) || '—';
    document.getElementById('s-pairs').textContent = data.stats?.pairsScanned || '—';

    const markNew = !isFirstLoad;
    isFirstLoad = false;
    renderGrid(allTokens, markNew);

    if(data.commentary){
      document.getElementById('c-txt').textContent = data.commentary;
      document.getElementById('c-time').textContent = new Date().toLocaleTimeString();
    }
    document.getElementById('status').textContent = 'Updated '+new Date().toLocaleTimeString();
  } catch(e){
    document.getElementById('status').textContent = 'Error — retrying...';
    console.error('[cr]',e);
  } finally{
    fetching = false;
    clearTimeout(timer);
    timer = setTimeout(fetchData, 10000);
  }
}

fetchData();
</script>
