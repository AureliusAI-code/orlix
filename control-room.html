<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orlix Control Room — Base Network Live Intelligence</title>
<meta name="description" content="Real-time Base network intelligence: new token launches, whale activity, and AI market commentary." />
<meta property="og:title" content="Orlix Control Room" />
<meta property="og:description" content="Live Base network intelligence dashboard — new tokens, whales, trending." />
<meta property="og:image" content="/og-image.png" />
<link rel="icon" href="/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07070A;
  --surface:#0D0D12;
  --surface2:#111118;
  --border:#1C1C26;
  --border2:#252532;
  --orange:#F07830;
  --green:#4ADE80;
  --yellow:#FBBF24;
  --red:#F87171;
  --purple:#A78BFA;
  --blue:#60A5FA;
  --text:#E5E7EB;
  --muted:#6B7280;
  --mono:'JetBrains Mono',monospace;
  --sans:'Plus Jakarta Sans',sans-serif;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}

/* ─── HEADER ─────────────────────────────────────────── */
.hdr{
  height:52px;display:flex;align-items:center;gap:16px;
  padding:0 20px;border-bottom:1px solid var(--border);
  background:var(--surface);position:fixed;top:0;left:0;right:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit}
.logo img{width:26px;height:26px;border-radius:50%}
.logo-name{font-weight:700;font-size:13px;letter-spacing:.04em}
.logo-sep{color:var(--border2);padding:0 2px}
.logo-cr{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:.12em}

.live{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--green);letter-spacing:.08em}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(74,222,128,.4)}
  50%{opacity:.7;box-shadow:0 0 0 5px rgba(74,222,128,0)}
}

.hdr-stats{display:flex;gap:24px;margin-left:auto}
.hstat{display:flex;flex-direction:column;align-items:center}
.hstat-v{font-family:var(--mono);font-size:13px;font-weight:500}
.hstat-l{font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}

.hdr-right{display:flex;align-items:center;gap:10px}
.refresh-txt{font-family:var(--mono);font-size:11px;color:var(--muted)}
.btn-nav{padding:5px 13px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;transition:opacity .15s}
.btn-home{background:var(--border2);color:var(--muted)}
.btn-home:hover{color:var(--text)}
.btn-app{background:var(--orange);color:#fff}
.btn-app:hover{opacity:.85}

/* ─── GRID ───────────────────────────────────────────── */
.main{
  position:fixed;top:52px;bottom:42px;left:0;right:0;
  display:grid;grid-template-columns:1fr 1fr 1fr;
}

/* ─── PANELS ─────────────────────────────────────────── */
.panel{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.panel:last-child{border-right:none}

.ph{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
.ph-title{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.ph-right{display:flex;align-items:center;gap:8px}
.ph-badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:99px;background:var(--border2);color:var(--muted)}
.ph-count{font-family:var(--mono);font-size:11px;color:var(--orange);font-weight:600}

.feed{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.feed::-webkit-scrollbar{width:3px}
.feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ─── SKELETON ───────────────────────────────────────── */
.sk{
  border-radius:8px;
  background:linear-gradient(90deg,var(--border) 0%,var(--border2) 50%,var(--border) 100%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  height:76px;margin-bottom:6px;
}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;gap:8px}
.empty-icon{font-size:28px;opacity:.2}
.empty-txt{font-size:12px;color:var(--muted)}

/* ─── TOKEN CARDS ────────────────────────────────────── */
.card{
  padding:10px 12px;border-radius:8px;border:1px solid var(--border);
  margin-bottom:6px;cursor:pointer;
  transition:border-color .15s,background .15s;
  background:var(--surface2);animation:fadeIn .3s ease;
}
.card:hover{border-color:var(--border2);background:#131320}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

.card-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}

.tok-icon{width:28px;height:28px;border-radius:50%;background:var(--border2);flex-shrink:0;object-fit:cover}
.tok-init{
  width:28px;height:28px;border-radius:50%;background:var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;
}

.tok-meta{flex:1;min-width:0}
.tok-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tok-addr{font-family:var(--mono);font-size:10px;color:var(--muted)}

.rbadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.04em;flex-shrink:0}
.r-safe{background:rgba(74,222,128,.1);color:var(--green)}
.r-caution{background:rgba(251,191,36,.1);color:var(--yellow)}
.r-high{background:rgba(248,113,113,.1);color:var(--red)}
.r-unknown{background:var(--border2);color:var(--muted)}

.tok-stats{display:flex;gap:14px;font-family:var(--mono);font-size:11px}
.ts-col{display:flex;flex-direction:column;gap:1px}
.ts-v{color:var(--text);font-size:12px}
.ts-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}

.tok-desc{font-size:10px;color:var(--muted);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}

/* ─── TRENDING ITEMS ─────────────────────────────────── */
.titem{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:8px;border:1px solid var(--border);
  margin-bottom:5px;cursor:pointer;
  transition:border-color .15s,background .15s;
  background:var(--surface2);animation:fadeIn .3s ease;
  text-decoration:none;color:inherit;
}
.titem:hover{border-color:var(--border2);background:#131320}
.t-rank{font-family:var(--mono);font-size:12px;color:var(--muted);width:18px;flex-shrink:0}
.t-info{flex:1;min-width:0}
.t-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-sym{font-family:var(--mono);font-size:10px;color:var(--muted)}
.t-right{text-align:right;flex-shrink:0;min-width:80px}
.t-chg{font-family:var(--mono);font-size:13px;font-weight:600}
.t-vol{font-family:var(--mono);font-size:10px;color:var(--muted)}

/* ─── WHALE ITEMS ────────────────────────────────────── */
.witem{
  padding:10px 12px;border-radius:8px;border:1px solid var(--border);
  margin-bottom:6px;cursor:pointer;
  transition:border-color .15s,background .15s;
  background:var(--surface2);animation:fadeIn .3s ease;
}
.witem:hover{border-color:var(--border2);background:#131320}
.w-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.w-left{}
.w-sym{font-size:15px;font-weight:700}
.w-price{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px}
.w-right{text-align:right}
.w-vol{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--orange)}
.w-vollbl{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px}
.w-bar-row{display:flex;align-items:center;gap:7px}
.w-bar{flex:1;height:4px;border-radius:2px;background:var(--border2);overflow:hidden}
.w-bar-fill{height:100%;background:var(--green);border-radius:2px}
.w-blbl{font-family:var(--mono);font-size:10px;flex-shrink:0}
.w-b{color:var(--green)}.w-s{color:var(--red)}

/* ─── COMMENTARY ─────────────────────────────────────── */
.commentary{
  position:fixed;bottom:0;left:0;right:0;height:42px;
  display:flex;align-items:center;gap:10px;padding:0 16px;
  border-top:1px solid var(--border);background:var(--surface);z-index:100;
}
.ai-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(167,139,250,.12);color:var(--purple);flex-shrink:0;letter-spacing:.06em}
.c-text{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.c-time{font-family:var(--mono);font-size:10px;color:var(--border2);flex-shrink:0}

/* ─── MODAL ──────────────────────────────────────────── */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(7,7,10,.82);
  backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;
}
.overlay.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border2);border-radius:12px;
  width:500px;max-width:calc(100vw - 32px);max-height:calc(100vh - 60px);
  display:flex;flex-direction:column;overflow:hidden;
  animation:modalIn .2s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.m-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
.m-title{font-size:14px;font-weight:700}
.m-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.m-close:hover{color:var(--text)}
.m-body{padding:16px;overflow-y:auto;flex:1}
.m-foot{padding:11px 16px;border-top:1px solid var(--border);display:flex;gap:8px}

.loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:48px}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--muted)}

.verdict{display:flex;align-items:center;justify-content:center;padding:12px;border-radius:8px;font-size:16px;font-weight:700;letter-spacing:.06em;margin-bottom:14px}
.v-safe{background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.v-caution{background:rgba(251,191,36,.08);color:var(--yellow);border:1px solid rgba(251,191,36,.2)}
.v-high{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.v-scam{background:rgba(248,113,113,.12);color:#ff4444;border:1px solid rgba(248,113,113,.3)}

.ag{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.astat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.astat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.astat-v{font-family:var(--mono);font-size:14px;font-weight:500}
.atext{font-size:12px;color:var(--muted);line-height:1.65;white-space:pre-wrap;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:220px;overflow-y:auto}
.aerr{color:var(--red);font-size:13px;text-align:center;padding:24px}

.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s}
.btn:hover{opacity:.82}
.btn-ghost{background:var(--border2);color:var(--text)}
.btn-orange{background:var(--orange);color:#fff}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <a href="/" class="logo">
    <img src="/orlix-logo.png" alt="Orlix" onerror="this.style.display='none'" />
    <span class="logo-name">ORLIX</span>
    <span class="logo-sep">/</span>
    <span class="logo-cr">CONTROL ROOM</span>
  </a>

  <div class="live"><div class="pulse"></div>LIVE</div>

  <div class="hdr-stats">
    <div class="hstat">
      <span class="hstat-v" id="s-new">—</span>
      <span class="hstat-l">New Tokens</span>
    </div>
    <div class="hstat">
      <span class="hstat-v" id="s-whale">—</span>
      <span class="hstat-l">Whale Vol/1h</span>
    </div>
    <div class="hstat">
      <span class="hstat-v" id="s-trending">—</span>
      <span class="hstat-l">Trending</span>
    </div>
  </div>

  <div class="hdr-right">
    <span class="refresh-txt" id="refresh-txt">Loading...</span>
    <a href="/" class="btn-nav btn-home">← Home</a>
    <a href="/app" class="btn-nav btn-app">Open App →</a>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- NEW TOKENS -->
  <section class="panel">
    <div class="ph">
      <span class="ph-title">New Tokens</span>
      <div class="ph-right">
        <span class="ph-badge">Base</span>
        <span class="ph-count" id="c-new">—</span>
      </div>
    </div>
    <div class="feed" id="f-new">
      <div class="sk"></div>
      <div class="sk" style="opacity:.5"></div>
      <div class="sk" style="opacity:.25"></div>
    </div>
  </section>

  <!-- TRENDING -->
  <section class="panel">
    <div class="ph">
      <span class="ph-title">Trending on Base</span>
      <div class="ph-right">
        <span class="ph-badge">volume</span>
      </div>
    </div>
    <div class="feed" id="f-trending">
      <div class="sk"></div>
      <div class="sk" style="opacity:.5"></div>
      <div class="sk" style="opacity:.25"></div>
    </div>
  </section>

  <!-- WHALE ACTIVITY -->
  <section class="panel">
    <div class="ph">
      <span class="ph-title">Whale Activity</span>
      <div class="ph-right">
        <span class="ph-badge">1h swap vol</span>
      </div>
    </div>
    <div class="feed" id="f-whales">
      <div class="sk"></div>
      <div class="sk" style="opacity:.5"></div>
      <div class="sk" style="opacity:.25"></div>
    </div>
  </section>

</main>

<!-- COMMENTARY -->
<footer class="commentary">
  <span class="ai-tag">AI</span>
  <span class="c-text" id="c-text">Connecting to Base network...</span>
  <span class="c-time" id="c-time"></span>
</footer>

<!-- ANALYSIS MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="m-head">
      <span class="m-title" id="m-title">Token Analysis</span>
      <button class="m-close" onclick="closeModal()">✕</button>
    </div>
    <div class="m-body" id="m-body">
      <div class="loading"><div class="spinner"></div><span class="loading-txt">Scanning token...</span></div>
    </div>
    <div class="m-foot">
      <a href="#" class="btn btn-ghost" id="m-dex" target="_blank" rel="noopener noreferrer">DexScreener ↗</a>
      <a href="#" class="btn btn-ghost" id="m-scan" target="_blank" rel="noopener noreferrer">Basescan ↗</a>
    </div>
  </div>
</div>

<script>
// ─── UTILS ───────────────────────────────────────────────────────────

function esc(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}

function fmtUsd(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(0);
}

function fmtChg(n) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

function chgCls(n) {
  if (n == null || isNaN(n)) return 'neu';
  return n >= 0 ? 'pos' : 'neg';
}

function fmtPrice(s) {
  if (!s) return '—';
  const n = parseFloat(s);
  if (isNaN(n)) return s;
  if (n < 0.000001) return '$' + n.toExponential(2);
  if (n < 0.001)    return '$' + n.toFixed(8);
  if (n < 1)        return '$' + n.toFixed(6);
  if (n < 100)      return '$' + n.toFixed(4);
  return '$' + n.toFixed(2);
}

function initials(name) {
  if (!name) return '?';
  const w = name.trim().split(/\s+/);
  return w.length >= 2 ? (w[0][0] + w[1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
}

function riskCls(r) {
  if (r === 'SAFE')      return 'r-safe';
  if (r === 'CAUTION')   return 'r-caution';
  if (r === 'HIGH RISK') return 'r-high';
  return 'r-unknown';
}

function icon(src, name, size) {
  const sz = size || 28;
  const ini = initials(name);
  if (src) {
    return `<img src="${esc(src)}" class="tok-icon" style="width:${sz}px;height:${sz}px" onerror="this.outerHTML='<div class=\\"tok-init\\" style=\\"width:${sz}px;height:${sz}px\\">${ini}</div>'" />`;
  }
  return `<div class="tok-init" style="width:${sz}px;height:${sz}px">${ini}</div>`;
}

function shortenAddr(a) {
  return a ? a.slice(0,6)+'…'+a.slice(-4) : '—';
}

// ─── RENDER NEW TOKENS ───────────────────────────────────────────────

function renderNew(tokens) {
  const el = document.getElementById('f-new');
  document.getElementById('c-new').textContent = tokens.length || '—';
  if (!tokens.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">◌</div><div class="empty-txt">No new tokens found</div></div>';
    return;
  }
  el.innerHTML = tokens.map(t => `
    <div class="card" onclick="openModal('${esc(t.address||'')}','${esc(t.name)}','${esc(t.pairUrl||'')}')">
      <div class="card-head">
        ${icon(t.icon, t.name)}
        <div class="tok-meta">
          <div class="tok-name">${esc(t.name)}</div>
          <div class="tok-addr">${shortenAddr(t.address)}</div>
        </div>
        <span class="rbadge ${riskCls(t.risk)}">${esc(t.risk||'SCAN')}</span>
      </div>
      <div class="tok-stats">
        <div class="ts-col">
          <span class="ts-v">${fmtUsd(t.liquidity)}</span>
          <span class="ts-l">Liquidity</span>
        </div>
        ${t.priceUsd ? `<div class="ts-col"><span class="ts-v">${fmtPrice(t.priceUsd)}</span><span class="ts-l">Price</span></div>` : ''}
        ${t.volume24h ? `<div class="ts-col"><span class="ts-v">${fmtUsd(t.volume24h)}</span><span class="ts-l">Vol 24h</span></div>` : ''}
        ${t.priceChange24h != null ? `<div class="ts-col"><span class="ts-v ${chgCls(t.priceChange24h)}">${fmtChg(t.priceChange24h)}</span><span class="ts-l">24h</span></div>` : ''}
      </div>
      ${t.description ? `<div class="tok-desc">${esc(t.description)}</div>` : ''}
    </div>
  `).join('');
}

// ─── RENDER TRENDING ─────────────────────────────────────────────────

function renderTrending(tokens) {
  const el = document.getElementById('f-trending');
  if (!tokens.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">◌</div><div class="empty-txt">No trending data</div></div>';
    return;
  }
  el.innerHTML = tokens.map((t,i) => `
    <div class="titem" onclick="openModal('${esc(t.address||'')}','${esc(t.name)}','${esc(t.pairUrl||'')}')">
      <span class="t-rank">${i+1}</span>
      ${icon(t.icon, t.name, 26)}
      <div class="t-info">
        <div class="t-name">${esc(t.name)}</div>
        <div class="t-sym">$${esc(t.symbol||'???')}</div>
      </div>
      <div class="t-right">
        <div class="t-chg ${chgCls(t.priceChange24h)}">${fmtChg(t.priceChange24h)}</div>
        <div class="t-vol">${fmtUsd(t.volume24h)}</div>
      </div>
    </div>
  `).join('');
}

// ─── RENDER WHALE ACTIVITY ───────────────────────────────────────────

function renderWhales(whales) {
  const el = document.getElementById('f-whales');
  if (!whales.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">◌</div><div class="empty-txt">No whale activity detected</div></div>';
    return;
  }
  el.innerHTML = whales.map(w => {
    const total = (w.buys1h||0) + (w.sells1h||0);
    const buyPct = total > 0 ? Math.round((w.buys1h/total)*100) : 50;
    const ch = w.priceChange1h||0;
    return `
      <div class="witem" onclick="openModal('${esc(w.address||'')}','${esc(w.name)}','${esc(w.pairUrl||'')}')">
        <div class="w-head">
          <div class="w-left">
            <div class="w-sym">$${esc(w.token)}</div>
            <div class="w-price">${fmtPrice(w.priceUsd)} <span class="${chgCls(ch)}">${fmtChg(ch)}</span></div>
          </div>
          <div class="w-right">
            <div class="w-vol">${fmtUsd(w.volume1h)}</div>
            <div class="w-vollbl">1H VOLUME</div>
          </div>
        </div>
        <div class="w-bar-row">
          <span class="w-blbl w-b">B${w.buys1h||0}</span>
          <div class="w-bar"><div class="w-bar-fill" style="width:${buyPct}%"></div></div>
          <span class="w-blbl w-s">S${w.sells1h||0}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ─── MODAL ───────────────────────────────────────────────────────────

function openModal(address, name, pairUrl) {
  if (!address) return;
  document.getElementById('m-title').textContent = name || shortenAddr(address);
  document.getElementById('m-dex').href = pairUrl || `https://dexscreener.com/base/${address}`;
  document.getElementById('m-scan').href = `https://basescan.org/token/${address}`;
  document.getElementById('m-body').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <span class="loading-txt">Scanning ${esc(name || shortenAddr(address))} on Base...</span>
    </div>`;
  document.getElementById('overlay').classList.add('open');

  fetch(`/api/analyze?address=${encodeURIComponent(address)}`)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(renderAnalysis)
    .catch(err => {
      document.getElementById('m-body').innerHTML = `<div class="aerr">Analysis failed: ${esc(String(err))}</div>`;
    });
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function renderAnalysis(data) {
  const d = data.dexInfo || {};
  const t = data.tokenInfo || {};
  const analysis = data.analysis || '';

  let vcls = '', vtxt = '';
  if (/SCAM LIKELY/i.test(analysis))  { vcls = 'v-scam';    vtxt = 'SCAM LIKELY'; }
  else if (/HIGH.?RISK/i.test(analysis)) { vcls = 'v-high';    vtxt = 'HIGH RISK'; }
  else if (/CAUTION/i.test(analysis)) { vcls = 'v-caution'; vtxt = 'CAUTION'; }
  else if (/SAFE/i.test(analysis))    { vcls = 'v-safe';    vtxt = 'SAFE'; }

  document.getElementById('m-body').innerHTML = `
    ${vcls ? `<div class="verdict ${vcls}">${vtxt}</div>` : ''}
    <div class="ag">
      <div class="astat"><div class="astat-l">Token</div><div class="astat-v">${esc(t.symbol||'—')}</div></div>
      <div class="astat"><div class="astat-l">Price</div><div class="astat-v">${fmtPrice(d.priceUsd||null)}</div></div>
      <div class="astat"><div class="astat-l">Liquidity</div><div class="astat-v">${fmtUsd(d.liquidityUsd)}</div></div>
      <div class="astat"><div class="astat-l">Market Cap</div><div class="astat-v">${fmtUsd(d.marketCap)}</div></div>
      <div class="astat"><div class="astat-l">24h Volume</div><div class="astat-v">${fmtUsd(d.volume24h)}</div></div>
      <div class="astat"><div class="astat-l">Liq/MCap</div><div class="astat-v">${d.liqMcapRatio ? d.liqMcapRatio+'%' : '—'}</div></div>
    </div>
    <div class="atext">${esc(analysis)}</div>
  `;
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── FETCH LOOP ───────────────────────────────────────────────────────

let countdown = 30;

async function fetchData() {
  try {
    const r = await fetch('/api/control-room');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    countdown = 30;

    document.getElementById('s-new').textContent = data.stats?.newTokensCount ?? '—';
    document.getElementById('s-whale').textContent = fmtUsd(data.stats?.totalVolume1h);
    document.getElementById('s-trending').textContent = data.stats?.trendingCount ?? '—';

    renderNew(data.newTokens || []);
    renderTrending(data.trending || []);
    renderWhales(data.whaleActivity || []);

    if (data.commentary) {
      document.getElementById('c-text').textContent = data.commentary;
      document.getElementById('c-time').textContent = new Date().toLocaleTimeString();
    }
  } catch (e) {
    document.getElementById('refresh-txt').textContent = 'Error — retrying...';
    console.error('[control-room]', e);
  }
}

function tick() {
  countdown = Math.max(0, countdown - 1);
  document.getElementById('refresh-txt').textContent = `Refreshes in ${countdown}s`;
  if (countdown === 0) fetchData();
}

fetchData();
setInterval(tick, 1000);
</script>
